<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Petty Cash Portal</title>
<style>html,body{margin:0;padding:0;height:100%;background:#F6F4EF;}#root{min-height:100vh;}</style>

<!-- In-browser React transpiler (no build step needed) -->
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>

<!-- Where the bare "react"/"recharts"/... imports resolve to -->
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/": "https://esm.sh/react@18.3.1/",
    "react-dom": "https://esm.sh/react-dom@18.3.1?deps=react@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?deps=react@18.3.1",
    "xlsx": "https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs",
    "recharts": "https://esm.sh/recharts@2.13.3?deps=react@18.3.1,react-dom@18.3.1",
    "lucide-react": "https://esm.sh/lucide-react@0.454.0?deps=react@18.3.1"
  }
}
</script>
</head>
<body>
<div id="root"></div>

<!-- Simple storage layer backed by this browser's localStorage.
     The app calls window.storage.get(key)/set(key, value). -->
<script>
  window.storage = {
    get: function (key) {
      try {
        var v = localStorage.getItem(key);
        return Promise.resolve(v == null ? null : { value: v });
      } catch (e) { return Promise.resolve(null); }
    },
    set: function (key, value) {
      try { localStorage.setItem(key, value); } catch (e) {}
      return Promise.resolve(true);
    }
  };
</script>

<!-- The portal itself, transpiled in the browser by Babel -->
<script type="text/babel" data-type="module" data-presets="react" src="PettyCashPortal.jsx"></script>
</body>
</html>
