.pcfmon-card-meta { color: var(--text-soft); font-size: 12.5px; margin: 3px 0 12px; }
.pcfmon-line { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; padding: 9px 0; border-top: 1px solid var(--paper-line); }
.pcfmon-line > span { color: var(--blue); font-size: 13px; }
.pcf-app.dark .pcfmon-line > span { color: var(--text-soft); }
.pcfmon-line > b { font-weight: 500; color: var(--text); white-space: nowrap; }
.pcfmon-total { border-top: 2px solid var(--paper-line); margin-top: 2px; }
.pcfmon-total > span { color: var(--ink); font-weight: 700; font-size: 13.5px; }
.pcf-app.dark .pcfmon-total > span { color: var(--text); }
.pcfmon-total > b { font-weight: 800; font-size: 15px; }
.pcfmon-foot { margin-top: 12px; color: var(--text-soft); font-size: 12px; }
@media print {
  .sidebar, .topbar, .module-toolbar { display: none !important; }
  .main-area, .content { display: block !important; }
  .pcfmon-card { break-inside: avoid; }
}
`;

/* ============================== APP ROOT ============================== */
const NAV = [
  { id: "dashboard", label: "Dashboard", icon: LayoutDashboard },
  { id: "monitoring", label: "PCF Monitoring", icon: Wallet },
  { id: "requests", label: "Petty Cash Request", icon: FileText },
  { id: "disbursements", label: "Disbursement Ledger", icon: Receipt },
  { id: "liquidation", label: "Liquidation", icon: Calculator },
  { id: "po", label: "Purchase Orders", icon: ShoppingCart },
  { id: "master", label: "Master Files", icon: Database },
  { id: "reports", label: "Reports", icon: BarChart3 },
];

function App() {
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("dashboard");
  const [dark, setDark] = useState(false);
  const [navOpen, setNavOpen] = useState(true);
  const [toasts, setToasts] = useState([]);

  const [master, setMaster] = useState({ companies: SEED_COMPANIES, branches: SEED_BRANCHES, coa: SEED_COA, subaccounts: SEED_SUBACCOUNTS });
  const [requests, setRequests] = useState([]);
  const [disbursements, setDisbursements] = useState([]);
  const [liquidations, setLiquidations] = useState({});
  const [pos, setPos] = useState([]);
  const [employees, setEmployees] = useState(SEED_EMPLOYEES);
  const [plants, setPlants] = useState(SEED_PLANTS);

  const notify = useCallback((msg, type = "ok") => {
    const id = Math.random().toString(36).slice(2);
    setToasts((t) => [...t, { id, msg, type }]);
    setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), 2800);
  }, []);

  useEffect(() => {
    (async () => {
      const savedMaster = await storageGet("pcf_master", null);
      const savedData = await storageGet("pcf_data", null);
      if (savedMaster) setMaster(savedMaster);
      if (savedData) {
        setRequests(savedData.requests || []);
        setDisbursements(savedData.disbursements || []);
        setLiquidations(savedData.liquidations || {});
        setPos(savedData.purchaseOrders || []);
        setEmployees(savedData.employees || SEED_EMPLOYEES);
        setPlants(savedData.plants || SEED_PLANTS);
      }
      setLoaded(true);
    })();
  }, []);

  useEffect(() => { if (loaded) storageSet("pcf_master", master); }, [master, loaded]);
  useEffect(() => {
    if (loaded) storageSet("pcf_data", { requests, disbursements, liquidations, purchaseOrders: pos, employees, plants });
  }, [requests, disbursements, liquidations, pos, employees, plants, loaded]);

  const data = { requests, disbursements, liquidations, plants };

  return (
    <div className={`pcf-app ${dark ? "dark" : ""}`}>
      <style>{APP_CSS}</style>
      <Toast toasts={toasts} />

      <aside className={`sidebar ${navOpen ? "" : "collapsed"}`}>
        <div className="brand">
          <div className="brand-logos">
            <img src={LOGO_A1} alt="A1+" />
            <img src={LOGO_STARKSON} alt="Starkson" />
          </div>
          {navOpen && <div className="brand-text">Petty Cash<br />Management</div>}
        </div>
        <nav>
          {NAV.map((n) => (
            <button key={n.id} className={`nav-item ${tab === n.id ? "active" : ""}`} onClick={() => setTab(n.id)}>
              <n.icon size={17} />
              {navOpen && <span>{n.label}</span>}
            </button>
          ))}
        </nav>
        <div className="sidebar-foot">{navOpen && <span>A1+ Paper &amp; Plastic Inc.<br/>Starkson Paper &amp; Plastic Corp.</span>}</div>
      </aside>

      <div className="main-area">
        <header className="topbar">
          <button className="icon-btn" onClick={() => setNavOpen((o) => !o)}><Menu size={18} /></button>
          <h2>{NAV.find((n) => n.id === tab)?.label}</h2>
          <div className="spacer" />
          <button className="icon-btn" onClick={() => setDark((d) => !d)}>{dark ? <Sun size={18} /> : <Moon size={18} />}</button>
        </header>
        <main className="content">
          {!loaded ? (
            <div className="empty-row" style={{ padding: 60 }}>Loading petty cash data&hellip;</div>
          ) : (
            <>
              {tab === "dashboard" && <Dashboard data={data} master={master} />}
              {tab === "monitoring" && <MonitoringModule data={data} master={master} />}
              {tab === "requests" && <RequestsModule requests={requests} setRequests={setRequests} master={master} notify={notify} />}
              {tab === "disbursements" && <DisbursementsModule disbursements={disbursements} setDisbursements={setDisbursements} liquidations={liquidations} requests={requests} master={master} notify={notify} />}
              {tab === "liquidation" && <LiquidationModule disbursements={disbursements} liquidations={liquidations} setLiquidations={setLiquidations} master={master} notify={notify} />}
              {tab === "po" && <PurchaseOrdersModule pos={pos} setPos={setPos} requests={requests} master={master} notify={notify} />}
              {tab === "master" && <MasterFilesModule master={master} setMaster={setMaster} employees={employees} setEmployees={setEmployees} plants={plants} setPlants={setPlants} notify={notify} />}
              {tab === "reports" && <ReportsModule data={data} master={master} notify={notify} />}
            </>
          )}
        </main>
      </div>
    </div>
  );
}

/* ============================== STYLES ============================== */
const APP_CSS = `
.pcf-app {
  --ink: #1B2430; --ink-2: #262F3D; --paper: #FAF7F1; --paper-2: #FFFFFF;
  --paper-line: #E4DDCB; --brass: #9C7A2E; --red: #C4272E; --green: #2F6B4F;
  --blue: #3B6EA5; --text: #24282F; --text-soft: #5B6472; --radius: 6px;
  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  color: var(--text); background: var(--paper); display: flex; min-height: 100vh; width: 100%;
  --font-display: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
  --font-mono: ui-monospace, "SF Mono", Consolas, "Liberation Mono", monospace;
}
.pcf-app.dark { --paper: #171B22; --paper-2: #1E232C; --paper-line: #303845; --text: #E7E5DD; --text-soft: #9AA3B0; }
.pcf-app * { box-sizing: border-box; }
.pcf-app h1, .pcf-app h2, .pcf-app h3, .pcf-app h4 { font-family: var(--font-display); margin: 0; font-weight: 600; }
.mono { font-family: var(--font-mono); font-size: 12.5px; }
.num { text-align: right; }

/* Sidebar */
.sidebar { width: 232px; background: var(--ink); color: #E9E4D8; display: flex; flex-direction: column; flex-shrink: 0; transition: width .18s ease; }
.sidebar.collapsed { width: 62px; }
.brand { display: flex; align-items: center; gap: 10px; padding: 16px 14px; border-bottom: 1px solid rgba(255,255,255,.1); }
.brand-logos { display: flex; gap: 6px; }
.brand-logos img { height: 28px; width: auto; object-fit: contain; background: #fff; border-radius: 3px; padding: 2px; }
.brand-text { font-family: var(--font-display); font-size: 13px; line-height: 1.25; color: #D9CBA0; font-weight: 600; }
.sidebar nav { display: flex; flex-direction: column; padding: 10px 8px; gap: 2px; flex: 1; }
.nav-item { display: flex; align-items: center; gap: 10px; background: none; border: none; color: #C7CBD4; padding: 9px 10px; border-radius: var(--radius); cursor: pointer; font-size: 13.5px; text-align: left; }
.nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
.nav-item.active { background: #9C7A2E; color: #1B2430; font-weight: 600; }
.sidebar-foot { padding: 12px 14px; font-size: 10.5px; color: #8B93A3; border-top: 1px solid rgba(255,255,255,.08); line-height: 1.4; }

/* Topbar / main */
.main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.topbar { display: flex; align-items: center; gap: 12px; padding: 12px 22px; background: var(--paper-2); border-bottom: 1px solid var(--paper-line); }
.topbar h2 { font-size: 17px; }
.content { padding: 22px; overflow: auto; flex: 1; }
.spacer { flex: 1; }

/* Buttons */
.btn-primary, .btn-ghost { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; padding: 7px 13px; border-radius: var(--radius); cursor: pointer; border: 1px solid transparent; font-weight: 600; white-space: nowrap; }
.btn-primary { background: var(--ink); color: #F1EAD8; }
.btn-primary:hover { background: var(--ink-2); }
.btn-ghost { background: var(--paper-2); color: var(--text); border-color: var(--paper-line); }
.btn-ghost:hover { border-color: var(--brass); color: var(--brass); }
.full-w { width: 100%; justify-content: center; }
.icon-btn { background: none; border: none; cursor: pointer; color: var(--text-soft); padding: 5px; border-radius: 5px; display: inline-flex; }
.icon-btn:hover { background: var(--paper-line); color: var(--text); }
.icon-btn.danger:hover { background: #FBE4E3; color: var(--red); }

/* Stat cards */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--paper-2); border: 1px solid var(--paper-line); border-radius: 8px; padding: 14px; display: flex; gap: 10px; align-items: flex-start; border-top: 3px solid var(--brass); }
.stat-card.tone-ink { border-top-color: var(--ink); } .stat-card.tone-blue { border-top-color: var(--blue); }
.stat-card.tone-green { border-top-color: var(--green); } .stat-card.tone-red { border-top-color: var(--red); }
.stat-icon { color: var(--text-soft); margin-top: 2px; }
.stat-label { font-size: 11.5px; color: var(--text-soft); text-transform: uppercase; letter-spacing: .04em; }
.stat-value { font-family: var(--font-mono); font-size: 19px; font-weight: 700; margin-top: 2px; }
.stat-sub { font-size: 11px; color: var(--text-soft); margin-top: 2px; }

/* Panels & charts */
.chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 14px; margin-bottom: 20px; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.panel { background: var(--paper-2); border: 1px solid var(--paper-line); border-radius: 8px; padding: 14px; }
.panel h4 { font-size: 13px; margin-bottom: 8px; color: var(--text); }

/* Ledger table */
.ledger-table { width: 100%; border-collapse: collapse; background: var(--paper-2); font-size: 12.8px; }
.ledger-table th { text-align: left; font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--text-soft); padding: 8px 10px; border-bottom: 2px solid var(--ink); background: var(--paper); position: sticky; top: 0; }
.ledger-table td { padding: 7px 10px; border-bottom: 1px solid var(--paper-line); vertical-align: middle; }
.ledger-table tbody tr:hover { background: rgba(156,122,46,.06); }
.ledger-table.compact td, .ledger-table.compact th { padding: 5px 8px; font-size: 12px; }
.ledger-table input, .ledger-table select { width: 100%; }
.truncate { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.empty-row { text-align: center; color: var(--text-soft); padding: 18px; font-size: 12.5px; }
.row-actions { display: flex; gap: 2px; white-space: nowrap; }
.hint-note { font-size: 11.5px; color: var(--text-soft); padding: 8px 2px; }

/* Ledger stamp badges */
.ledger-stamp { display: inline-block; font-family: var(--font-display); font-weight: 700; font-size: 10.5px; letter-spacing: .06em; text-transform: uppercase; padding: 2px 8px; border: 1.5px solid currentColor; border-radius: 3px; transform: rotate(-2deg); }
.stamp-brass { color: var(--brass); } .stamp-green { color: var(--green); } .stamp-red { color: var(--red); }
.stamp-blue { color: var(--blue); } .stamp-grey { color: var(--text-soft); }

/* Module toolbar */
.module-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.search-box { display: flex; align-items: center; gap: 6px; background: var(--paper-2); border: 1px solid var(--paper-line); border-radius: var(--radius); padding: 6px 10px; min-width: 220px; color: var(--text-soft); }
.search-box input { border: none; outline: none; background: none; font-size: 13px; color: var(--text); width: 100%; }
select, input[type=text], input[type=number], input[type=date], textarea { border: 1px solid var(--paper-line); border-radius: var(--radius); padding: 6px 9px; font-size: 12.8px; background: var(--paper-2); color: var(--text); font-family: inherit; }
textarea { width: 100%; resize: vertical; }
.count-pill { font-size: 11.5px; color: var(--text-soft); background: var(--paper); border: 1px solid var(--paper-line); padding: 4px 9px; border-radius: 20px; }

/* Modal */
.modal-backdrop { position: fixed; inset: 0; background: rgba(20,20,20,.45); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
.modal-panel { background: var(--paper-2); border-radius: 10px; width: 560px; max-width: 100%; max-height: 88vh; overflow: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
.modal-wide { width: 760px; }
.modal-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--paper-line); }
.modal-head h3 { font-size: 15px; }
.modal-body { padding: 18px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; padding: 14px 18px; border-top: 1px solid var(--paper-line); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field { display: flex; flex-direction: column; gap: 4px; font-size: 12.5px; }
.field-wide { grid-column: 1 / -1; }
.field-label { font-size: 11px; color: var(--text-soft); text-transform: uppercase; letter-spacing: .03em; }

/* Searchable select */
.ss-wrap { position: relative; }
.ss-trigger { display: flex; justify-content: space-between; align-items: center; width: 100%; border: 1px solid var(--paper-line); border-radius: var(--radius); padding: 6px 9px; background: var(--paper-2); font-size: 12.8px; cursor: pointer; color: var(--text); }
.ss-placeholder { color: var(--text-soft); }
.ss-panel { position: absolute; z-index: 40; top: calc(100% + 4px); left: 0; width: 280px; background: var(--paper-2); border: 1px solid var(--paper-line); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,.15); overflow: hidden; }
.ss-search { display: flex; align-items: center; gap: 6px; padding: 8px 10px; border-bottom: 1px solid var(--paper-line); color: var(--text-soft); }
.ss-search input { border: none; outline: none; background: none; width: 100%; font-size: 12.8px; color: var(--text); }
.ss-list { max-height: 220px; overflow: auto; }
.ss-item { display: flex; gap: 8px; padding: 7px 10px; font-size: 12.5px; cursor: pointer; }
.ss-item:hover { background: var(--paper); }
.ss-item-code { font-family: var(--font-mono); color: var(--brass); font-size: 11px; min-width: 62px; }
.ss-empty { padding: 10px; font-size: 12px; color: var(--text-soft); }

/* Subtabs */
.subtabs { display: flex; gap: 4px; margin-bottom: 14px; border-bottom: 1px solid var(--paper-line); flex-wrap: wrap; }
.subtab { background: none; border: none; padding: 8px 12px; font-size: 12.5px; cursor: pointer; color: var(--text-soft); border-bottom: 2px solid transparent; }
.subtab.active { color: var(--ink); border-bottom-color: var(--brass); font-weight: 700; }
.pcf-app.dark .subtab.active { color: #E9E4D8; }

/* Liquidation module */
.liq-module { display: grid; grid-template-columns: 300px 1fr; gap: 14px; }
.liq-sidebar { display: flex; flex-direction: column; gap: 10px; }
.liq-list { border: 1px solid var(--paper-line); border-radius: 8px; overflow: auto; max-height: 60vh; background: var(--paper-2); }
.liq-list-item { padding: 10px 12px; border-bottom: 1px solid var(--paper-line); cursor: pointer; }
.liq-list-item:hover { background: var(--paper); }
.liq-list-item.active { background: rgba(156,122,46,.12); border-left: 3px solid var(--brass); }
.liq-list-top { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin-bottom: 3px; }
.liq-list-sub { font-size: 11.5px; color: var(--text-soft); }
.liq-main { background: var(--paper-2); border: 1px solid var(--paper-line); border-radius: 8px; padding: 16px; }
.liq-header { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px dashed var(--paper-line); }
.liq-meta { font-size: 12px; color: var(--text-soft); margin-top: 2px; }
.liq-amounts { display: flex; gap: 18px; }
.liq-amounts > div { text-align: center; }
.liq-amounts span { display: block; font-size: 10.5px; text-transform: uppercase; color: var(--text-soft); }
.liq-amounts strong { font-family: var(--font-mono); font-size: 15px; }
.liq-amounts .neg strong { color: var(--red); }
.liq-footer-actions { display: flex; align-items: center; margin: 12px 0; }

/* Toasts */
.toast-stack { position: fixed; top: 16px; right: 16px; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--ink); color: #F1EAD8; padding: 10px 16px; border-radius: 6px; font-size: 12.8px; box-shadow: 0 8px 24px rgba(0,0,0,.25); border-left: 3px solid var(--brass); }
.toast-error { border-left-color: var(--red); }

@media (max-width: 900px) {
  .form-grid { grid-template-columns: 1fr; }
  .two-col { grid-template-columns: 1fr; }
  .liq-module { grid-template-columns: 1fr; }
}
`;


createRoot(document.getElementById("root")).render(<App />);
</script>
