<script>
  /* ================================================================
     A1+ Petty Cash Portal — Login (Supabase Auth)
     ----------------------------------------------------------------
     Users sign in with an email + password that you create in your
     Supabase project (Authentication -> Users -> Add user). No
     passwords are ever stored in this file. Login only turns on once
     config.js is filled in; otherwise the app runs locally as before
     with no login.
     ================================================================ */
  (function () {
    var cfg = window.PCF_CONFIG || {};
    var url = (cfg.SUPABASE_URL || "").replace(/\/+$/, "");
    var anon = cfg.SUPABASE_ANON_KEY || "";
    var configured = !!url && !!anon && url.indexOf("YOUR-") === -1 && anon.indexOf("YOUR-") === -1;
    var SESSION_KEY = "pcf_session";

    var resolveReady;
    var auth = window.PCF_AUTH = {
      accessToken: null,
      email: null,
      configured: configured,
      ready: new Promise(function (r) { resolveReady = r; })
    };

    // Cloud not set up yet -> no login, keep old local-only behaviour.
    if (!configured) { resolveReady(); return; }

    function nowSec() { return Math.floor(Date.now() / 1000); }
    function loadSession() { try { return JSON.parse(localStorage.getItem(SESSION_KEY) || "null"); } catch (e) { return null; } }
    function saveSession(s) { localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }
    function clearSession() { localStorage.removeItem(SESSION_KEY); }

    async function tokenRequest(grant, body) {
      var res = await fetch(url + "/auth/v1/token?grant_type=" + grant, {
        method: "POST",
        headers: { "apikey": anon, "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      var data = await res.json().catch(function () { return {}; });
      if (!res.ok) throw new Error(data.error_description || data.msg || data.error || ("Sign in failed (" + res.status + ")"));
      return data;
    }
    function applySession(data) {
      var s = {
        access_token: data.access_token,
        refresh_token: data.refresh_token,
        expires_at: nowSec() + (data.expires_in || 3600),
        email: data.user && data.user.email
      };
      saveSession(s);
      auth.accessToken = s.access_token;
      auth.email = s.email;
      return s;
    }

    auth.login = async function (email, password) {
      applySession(await tokenRequest("password", { email: email, password: password }));
      return true;
    };

    var refreshing = null;
    auth.tryRefresh = function () {
      if (refreshing) return refreshing;
      var s = loadSession();
      if (!s || !s.refresh_token) return Promise.resolve(false);
      refreshing = tokenRequest("refresh_token", { refresh_token: s.refresh_token })
        .then(function (data) { applySession(data); refreshing = null; return true; })
        .catch(function () { clearSession(); auth.accessToken = null; refreshing = null; return false; });
      return refreshing;
    };

    auth.logout = function () {
      try { fetch(url + "/auth/v1/logout", { method: "POST", headers: { "apikey": anon, "Authorization": "Bearer " + (auth.accessToken || anon) } }); } catch (e) {}
      clearSession();
      auth.accessToken = null;
      location.reload();
    };
    auth.requireLogin = function () { clearSession(); auth.accessToken = null; location.reload(); };

    /* ---- login screen UI ---- */
    var STYLE = `
      #pcf-auth-overlay{position:fixed;inset:0;z-index:2147483000;display:flex;align-items:center;justify-content:center;
        background:radial-gradient(1200px 600px at 50% -10%, #1f2937, #0b1220);padding:20px;
        font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
      .pcf-auth-card{width:100%;max-width:380px;background:#fff;border-radius:16px;padding:32px 28px;
        box-shadow:0 20px 60px rgba(0,0,0,.45);box-sizing:border-box;}
      .pcf-auth-brand{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#b45309,#f59e0b);
        color:#fff;font-weight:800;font-size:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;
        box-shadow:0 6px 16px rgba(180,83,9,.35);}
      .pcf-auth-title{margin:0;text-align:center;font-size:20px;font-weight:700;color:#111827;}
      .pcf-auth-sub{margin:6px 0 20px;text-align:center;font-size:13px;color:#6b7280;}
      .pcf-auth-label{display:block;font-size:12px;font-weight:600;color:#374151;margin:12px 0 6px;}
      .pcf-auth-input{width:100%;box-sizing:border-box;padding:11px 12px;border:1px solid #d1d5db;border-radius:10px;
        font-size:14px;color:#111827;outline:none;transition:border-color .15s,box-shadow .15s;}
      .pcf-auth-input:focus{border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.2);}
      .pcf-auth-btn{width:100%;margin-top:20px;padding:12px;border:0;border-radius:10px;
        background:linear-gradient(135deg,#b45309,#f59e0b);color:#fff;font-size:15px;font-weight:700;cursor:pointer;
        transition:filter .15s,opacity .15s;}
      .pcf-auth-btn:hover{filter:brightness(1.06);}
      .pcf-auth-btn:disabled{opacity:.7;cursor:default;}
      .pcf-auth-err{min-height:18px;margin-top:12px;color:#dc2626;font-size:12.5px;text-align:center;font-weight:600;}
      .pcf-auth-spin{width:34px;height:34px;border-radius:50%;border:3px solid #e5e7eb;border-top-color:#f59e0b;
        margin:10px auto 0;animation:pcf-spin .8s linear infinite;}
      @keyframes pcf-spin{to{transform:rotate(360deg);}}
      #pcf-auth-badge{position:fixed;bottom:12px;right:12px;z-index:2147482000;display:flex;align-items:center;gap:8px;
        background:rgba(17,24,39,.85);color:#fff;padding:6px 8px 6px 12px;border-radius:999px;
        font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-size:12px;
        box-shadow:0 4px 14px rgba(0,0,0,.25);}
      .pcf-badge-email{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:.9;}
      .pcf-badge-btn{border:0;background:#f59e0b;color:#111827;font-weight:700;font-size:11.5px;padding:5px 10px;
        border-radius:999px;cursor:pointer;}
      .pcf-badge-btn:hover{filter:brightness(1.06);}
      /* When placed inside the app header (.topbar), sit inline instead of floating */
      #pcf-auth-badge.pcf-inheader{position:static;bottom:auto;right:auto;background:transparent;box-shadow:none;
        padding:0;margin-left:auto;color:inherit;}
      #pcf-auth-badge.pcf-inheader .pcf-badge-email{color:inherit;opacity:.7;}
    `;
    function injectStyle() { var s = document.createElement("style"); s.textContent = STYLE; document.head.appendChild(s); }

    var overlay;
    function ensureOverlay() {
      if (!overlay) { overlay = document.createElement("div"); overlay.id = "pcf-auth-overlay"; document.body.appendChild(overlay); }
      return overlay;
    }
    function removeOverlay() { if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay); overlay = null; }

    function showLoading(msg) {
      ensureOverlay().innerHTML =
        '<div class="pcf-auth-card"><div class="pcf-auth-brand">A1+</div>' +
        '<div class="pcf-auth-spin"></div><p class="pcf-auth-sub">' + (msg || "Signing in…") + '</p></div>';
    }

    function esc(t) { var d = document.createElement("div"); d.textContent = t == null ? "" : String(t); return d.innerHTML; }

    function showLogin(msg) {
      ensureOverlay().innerHTML =
        '<form class="pcf-auth-card" id="pcf-login-form" autocomplete="on">' +
        '  <div class="pcf-auth-brand">A1+</div>' +
        '  <h1 class="pcf-auth-title">Petty Cash Portal</h1>' +
        '  <p class="pcf-auth-sub">Please sign in to continue</p>' +
        '  <label class="pcf-auth-label" for="pcf-email">Email</label>' +
        '  <input class="pcf-auth-input" type="email" id="pcf-email" required autocomplete="username" placeholder="you@company.com" />' +
        '  <label class="pcf-auth-label" for="pcf-pass">Password</label>' +
        '  <input class="pcf-auth-input" type="password" id="pcf-pass" required autocomplete="current-password" placeholder="••••••••" />' +
        '  <div class="pcf-auth-err" id="pcf-err">' + esc(msg) + '</div>' +
        '  <button class="pcf-auth-btn" type="submit" id="pcf-submit">Sign in</button>' +
        '</form>';
      var form = document.getElementById("pcf-login-form");
      var err = document.getElementById("pcf-err");
      var btn = document.getElementById("pcf-submit");
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        err.textContent = "";
        btn.disabled = true; btn.textContent = "Signing in…";
        var email = document.getElementById("pcf-email").value.trim();
        var pass = document.getElementById("pcf-pass").value;
        auth.login(email, pass)
          .then(function () { onAuthenticated(); })
          .catch(function (ex) { err.textContent = (ex && ex.message) || "Sign in failed"; btn.disabled = false; btn.textContent = "Sign in"; });
      });
      var em = document.getElementById("pcf-email"); if (em) em.focus();
    }

    // Place the "signed in as … / Sign out" control into the app header
    // (.topbar) when it exists; otherwise float it in the bottom-right.
    function mountBadge() {
      if (document.getElementById("pcf-auth-badge")) return;
      function build(inHeader) {
        var w = document.createElement("div");
        w.id = "pcf-auth-badge";
        if (inHeader) w.className = "pcf-inheader";
        w.innerHTML = '<span class="pcf-badge-email"></span><button class="pcf-badge-btn" id="pcf-logout" type="button">Sign out</button>';
        w.querySelector(".pcf-badge-email").textContent = auth.email || "Signed in";
        w.querySelector("#pcf-logout").addEventListener("click", function () { auth.logout(); });
        return w;
      }
      var header = document.querySelector("header.topbar, .topbar");
      if (header) { header.appendChild(build(true)); return; }
      // Header not rendered yet (React) — watch for it, with a floating fallback.
      var placed = false;
      var obs = new MutationObserver(function () {
        if (placed || document.getElementById("pcf-auth-badge")) return;
        var h = document.querySelector("header.topbar, .topbar");
        if (h) { placed = true; obs.disconnect(); h.appendChild(build(true)); }
      });
      obs.observe(document.documentElement, { childList: true, subtree: true });
      setTimeout(function () {
        if (placed || document.getElementById("pcf-auth-badge")) return;
        placed = true; obs.disconnect(); document.body.appendChild(build(false));
      }, 5000);
    }

    var authed = false;
    function onAuthenticated() {
      if (authed) return; authed = true;
      resolveReady();
      removeOverlay();
      mountBadge();
    }

    /* ---- boot ---- */
    injectStyle();
    var sess = loadSession();
    if (sess && sess.access_token && sess.expires_at && (sess.expires_at - 60) > nowSec()) {
      auth.accessToken = sess.access_token; auth.email = sess.email;
      onAuthenticated();
    } else if (sess && sess.refresh_token) {
      showLoading();
      auth.tryRefresh().then(function (ok) { ok ? onAuthenticated() : showLogin("Your session expired. Please sign in again."); });
    } else {
      showLogin();
    }
  })();
</script>
<script>
  /* ================================================================
     A1+ Petty Cash Portal — shared cloud storage
     ----------------------------------------------------------------
     Data is saved to an open-source Postgres database (Supabase) so
     that EVERY PC / branch sees the same data. The two connection
     values live in config.js. If they are not filled in yet, the app
     falls back to this browser's local storage (the old behaviour).
     ================================================================ */
  (function () {
    var cfg = window.PCF_CONFIG || {};
    var url = (cfg.SUPABASE_URL || "").replace(/\/+$/, "");
    var anon = cfg.SUPABASE_ANON_KEY || "";
    var configured = !!url && !!anon && url.indexOf("YOUR-") === -1 && anon.indexOf("YOUR-") === -1;
    var TABLE = "app_storage";

    async function rest(path, opts) {
      opts = opts || {};
      function build(token) {
        var o = { method: opts.method, body: opts.body };
        o.headers = Object.assign({
          "apikey": anon,
          "Authorization": "Bearer " + (token || (window.PCF_AUTH && window.PCF_AUTH.accessToken) || anon),
          "Content-Type": "application/json"
        }, opts.headers || {});
        return o;
      }
      var res = await fetch(url + "/rest/v1/" + path, build());
      // Token expired mid-session? Refresh once and retry.
      if (res.status === 401 && window.PCF_AUTH && window.PCF_AUTH.tryRefresh) {
        var ok = await window.PCF_AUTH.tryRefresh();
        if (ok) res = await fetch(url + "/rest/v1/" + path, build(window.PCF_AUTH.accessToken));
        else if (window.PCF_AUTH.requireLogin) window.PCF_AUTH.requireLogin();
      }
      return res;
    }

    window.storage = {
      // Read a key: cloud first, fall back to this browser's cache if offline.
      get: async function (key) {
        if (!configured) {
          var lv = localStorage.getItem(key);
          return lv == null ? null : { value: lv };
        }
        if (window.PCF_AUTH) await window.PCF_AUTH.ready; // wait until signed in
        if (window.PCF_AUTH && !window.PCF_AUTH.accessToken) {
          var lc = localStorage.getItem(key);
          return lc == null ? null : { value: lc };
        }
        try {
          var res = await rest(TABLE + "?select=value&key=eq." + encodeURIComponent(key), { method: "GET" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          var rows = await res.json();
          if (rows && rows.length && rows[0].value != null) {
            localStorage.setItem(key, rows[0].value); // keep a local cache
            return { value: rows[0].value };
          }
          // Nothing in the cloud yet: if THIS browser has old local data,
          // push it up once so existing entries are not lost.
          var local = localStorage.getItem(key);
          if (local != null) {
            try { await window.storage.set(key, local); } catch (e) {}
            return { value: local };
          }
          return null;
        } catch (e) {
          console.warn("[storage] cloud read failed, using local cache:", e);
          var cv = localStorage.getItem(key);
          return cv == null ? null : { value: cv };
        }
      },
      // Save a key to the cloud (and cache locally).
      set: async function (key, value) {
        localStorage.setItem(key, value);
        if (!configured) return true;
        if (window.PCF_AUTH) await window.PCF_AUTH.ready; // wait until signed in
        if (window.PCF_AUTH && !window.PCF_AUTH.accessToken) return true;
        try {
          var res = await rest(TABLE + "?on_conflict=key", {
            method: "POST",
            headers: { "Prefer": "resolution=merge-duplicates,return=minimal" },
            body: JSON.stringify({ key: key, value: value, updated_at: new Date().toISOString() })
          });
          if (!res.ok) throw new Error("HTTP " + res.status + " " + (await res.text()));
          return true;
        } catch (e) {
          console.error("[storage] cloud save failed:", e);
          return false;
        }
      }
    };

    if (!configured) {
      console.warn("[A1+ Petty Cash] Cloud database not configured yet — edit config.js. Using this browser's local storage only for now.");
    }
  })();
</script>

/* ============================== HELPERS ============================== */
const peso = (n) => `\u20B1${(Number(n) || 0).toLocaleString("en-PH", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
const todayISO = () => new Date().toISOString().slice(0, 10);
const uid = (prefix) => `${prefix}-${Date.now().toString(36).toUpperCase()}${Math.floor(Math.random() * 900 + 100)}`;
const fmtDate = (d) => { if (!d) return ""; const dt = new Date(d); return dt.toLocaleDateString("en-PH", { year: "numeric", month: "short", day: "numeric" }); };

async function storageGet(key, fallback) {
  try {
    const res = await window.storage.get(key, true);
    if (res && res.value) return JSON.parse(res.value);
    return fallback;
  } catch (e) { return fallback; }
}
async function storageSet(key, value) {
  try { await window.storage.set(key, JSON.stringify(value), true); return true; }
  catch (e) { console.error("storage set failed", key, e); return false; }
}

/* ============================== SMALL UI PRIMITIVES ============================== */
function Stamp({ label, tone = "brass" }) {
  const toneClass = { brass: "stamp-brass", green: "stamp-green", red: "stamp-red", blue: "stamp-blue", grey: "stamp-grey" }[tone] || "stamp-brass";
  return <span className={`ledger-stamp ${toneClass}`}>{label}</span>;
}

function toneForStatus(status) {
  if (["Approved", "Liquidated", "Completed"].includes(status)) return "green";
  if (["Rejected", "Over-Liquidated"].includes(status)) return "red";
  if (["Disbursed", "Open"].includes(status)) return "blue";
  if (["Pending", "Partially Liquidated"].includes(status)) return "brass";
  return "grey";
}

function SearchableSelect({ value, onChange, options, placeholder = "Select...", getLabel = (o) => o.name, getValue = (o) => o.code }) {
  const [open, setOpen] = useState(false);
  const [q, setQ] = useState("");
  const ref = useRef(null);
  useEffect(() => {
    function onDoc(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, []);
  const filtered = useMemo(() => {
    if (!q.trim()) return options.slice(0, 60);
    const lq = q.toLowerCase();
    return options.filter((o) => getLabel(o).toLowerCase().includes(lq) || String(getValue(o)).toLowerCase().includes(lq)).slice(0, 60);
  }, [q, options]);
  const selected = options.find((o) => getValue(o) === value);
  return (
    <div className="ss-wrap" ref={ref}>
      <button type="button" className="ss-trigger" onClick={() => setOpen((o) => !o)}>
        <span className={selected ? "" : "ss-placeholder"}>{selected ? getLabel(selected) : placeholder}</span>
        <ChevronDown size={14} />
      </button>
      {open && (
        <div className="ss-panel">
          <div className="ss-search">
            <Search size={13} />
            <input autoFocus value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search..." />
          </div>
          <div className="ss-list">
            {filtered.length === 0 && <div className="ss-empty">No matches</div>}
            {filtered.map((o) => (
              <div key={getValue(o)} className="ss-item" onClick={() => { onChange(getValue(o)); setOpen(false); setQ(""); }}>
                <span className="ss-item-code">{getValue(o)}</span>
                <span>{getLabel(o)}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function Modal({ title, onClose, children, wide }) {
  return (
    <div className="modal-backdrop" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className={`modal-panel ${wide ? "modal-wide" : ""}`}>
        <div className="modal-head">
          <h3>{title}</h3>
          <button className="icon-btn" onClick={onClose}><X size={18} /></button>
        </div>
        <div className="modal-body">{children}</div>
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <label className="field">
      <span className="field-label">{label}</span>
      {children}
    </label>
  );
}

function Toast({ toasts }) {
  return (
    <div className="toast-stack">
      {toasts.map((t) => (
        <div key={t.id} className={`toast toast-${t.type || "ok"}`}>{t.msg}</div>
      ))}
    </div>
  );
}

function StatCard({ icon: Icon, label, value, sub, tone = "ink" }) {
  return (
    <div className={`stat-card tone-${tone}`}>
      <div className="stat-icon"><Icon size={18} /></div>
      <div className="stat-body">
        <div className="stat-label">{label}</div>
        <div className="stat-value">{value}</div>
        {sub && <div className="stat-sub">{sub}</div>}
      </div>
    </div>
  );
}

const PIE_COLORS = ["#9C7A2E", "#3B6EA5", "#2F6B4F", "#C4272E", "#7C5FB0", "#5A6472", "#B0862E"];

function Dashboard({ data, master }) {
  const { requests, disbursements, liquidations, plants } = data;

  const totalFund = plants.reduce((s, p) => s + Number(p.beginningBalance || 0), 0);
  const totalDisbursed = disbursements.reduce((s, d) => s + Number(d.amount || 0), 0);
  const totalLiquidated = Object.values(liquidations).reduce((s, l) => s + l.lines.reduce((ss, ln) => ss + Number(ln.amount || 0), 0), 0);
  const availableBalance = totalFund - totalDisbursed + totalLiquidated;
  const pendingRequests = requests.filter((r) => r.status === "Pending").length;
  const pendingLiquidation = disbursements.filter((d) => {
    const liq = liquidations[d.id];
    const liqTotal = liq ? liq.lines.reduce((s, l) => s + Number(l.amount || 0), 0) : 0;
    return liqTotal < Number(d.amount || 0);
  }).length;
  const completedBilled = disbursements.filter((d) => {
    const liq = liquidations[d.id];
    const liqTotal = liq ? liq.lines.reduce((s, l) => s + Number(l.amount || 0), 0) : 0;
    return liqTotal >= Number(d.amount || 0) && liq && liq.lines.length > 0;
  }).length;
  const activeEmployees = new Set(disbursements.filter((d) => {
    const liq = liquidations[d.id];
    const liqTotal = liq ? liq.lines.reduce((s, l) => s + Number(l.amount || 0), 0) : 0;
    return liqTotal < Number(d.amount || 0);
  }).map((d) => d.employee)).size;

  const byBranch = useMemo(() => {
    const m = {};
    disbursements.forEach((d) => { m[d.branch] = (m[d.branch] || 0) + Number(d.amount || 0); });
    return Object.entries(m).map(([name, value]) => ({ name, value }));
  }, [disbursements]);

  const byCompany = useMemo(() => {
    const m = {};
    disbursements.forEach((d) => { m[d.company] = (m[d.company] || 0) + Number(d.amount || 0); });
    return Object.entries(m).map(([name, value]) => ({ name, value }));
  }, [disbursements]);

  const byDept = useMemo(() => {
    const m = {};
    disbursements.forEach((d) => { m[d.department] = (m[d.department] || 0) + Number(d.amount || 0); });
    return Object.entries(m).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value).slice(0, 8);
  }, [disbursements]);

  const byCategory = useMemo(() => {
    const m = {};
    Object.values(liquidations).forEach((l) => l.lines.forEach((ln) => { m[ln.coa] = (m[ln.coa] || 0) + Number(ln.amount || 0); }));
    return Object.entries(m).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value).slice(0, 8);
  }, [liquidations]);

  const monthlyTrend = useMemo(() => {
    const m = {};
    disbursements.forEach((d) => {
      const key = (d.date || "").slice(0, 7);
      if (!key) return;
      m[key] = (m[key] || 0) + Number(d.amount || 0);
    });
    return Object.entries(m).sort(([a], [b]) => a.localeCompare(b)).map(([month, value]) => ({ month, value }));
  }, [disbursements]);

  const liquidationStatusData = useMemo(() => {
    let liquidated = 0, partial = 0, over = 0, none = 0;
    disbursements.forEach((d) => {
      const liq = liquidations[d.id];
      const liqTotal = liq ? liq.lines.reduce((s, l) => s + Number(l.amount || 0), 0) : 0;
      const amt = Number(d.amount || 0);
      if (liqTotal === 0) none++;
      else if (liqTotal > amt) over++;
      else if (liqTotal === amt) liquidated++;
      else partial++;
    });
    return [
      { name: "Liquidated", value: liquidated },
      { name: "Partial", value: partial },
      { name: "Over", value: over },
      { name: "Not Started", value: none },
    ].filter((d) => d.value > 0);
  }, [disbursements, liquidations]);

  const recentTx = [...disbursements].sort((a, b) => (b.date || "").localeCompare(a.date || "")).slice(0, 6);
  const recentLiq = Object.entries(liquidations)
    .map(([id, l]) => ({ id, ...l, total: l.lines.reduce((s, x) => s + Number(x.amount || 0), 0) }))
    .sort((a, b) => (b.lines[0]?.date || "").localeCompare(a.lines[0]?.date || "")).slice(0, 6);

  return (
    <div className="dash">
      <div className="stat-grid">
        <StatCard icon={Wallet} label="Total Fund" value={peso(totalFund)} tone="brass" />
        <StatCard icon={TrendingUp} label="Beginning Balance" value={peso(totalFund)} tone="ink" />
        <StatCard icon={ArrowUpRight} label="Total Disbursed" value={peso(totalDisbursed)} tone="blue" />
        <StatCard icon={ArrowDownRight} label="Total Liquidated" value={peso(totalLiquidated)} tone="green" />
        <StatCard icon={Wallet} label="Available Balance" value={peso(availableBalance)} tone="brass" />
        <StatCard icon={CheckCircle2} label="Completed & Billed" value={completedBilled} tone="green" />
        <StatCard icon={Clock} label="Pending Requests" value={pendingRequests} tone="red" />
        <StatCard icon={AlertTriangle} label="Pending Liquidation" value={pendingLiquidation} tone="red" />
        <StatCard icon={Users} label="Employees w/ Active Advances" value={activeEmployees} tone="ink" />
      </div>

      <div className="chart-grid">
        <div className="panel">
          <h4>Disbursements by Branch</h4>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={byBranch}>
              <CartesianGrid strokeDasharray="3 3" stroke="var(--paper-line)" />
              <XAxis dataKey="name" tick={{ fontSize: 11 }} />
              <YAxis tick={{ fontSize: 11 }} />
              <Tooltip formatter={(v) => peso(v)} />
              <Bar dataKey="value" fill="#9C7A2E" radius={[3, 3, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div className="panel">
          <h4>Disbursements by Company</h4>
          <ResponsiveContainer width="100%" height={220}>
            <PieChart>
              <Pie data={byCompany} dataKey="value" nameKey="name" outerRadius={80} label={(e) => e.name}>
                {byCompany.map((_, i) => <Cell key={i} fill={PIE_COLORS[i % PIE_COLORS.length]} />)}
              </Pie>
              <Tooltip formatter={(v) => peso(v)} />
            </PieChart>
          </ResponsiveContainer>
        </div>
        <div className="panel">
          <h4>Disbursements by Department</h4>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={byDept} layout="vertical" margin={{ left: 20 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="var(--paper-line)" />
              <XAxis type="number" tick={{ fontSize: 10 }} />
              <YAxis type="category" dataKey="name" tick={{ fontSize: 10 }} width={140} />
              <Tooltip formatter={(v) => peso(v)} />
              <Bar dataKey="value" fill="#3B6EA5" radius={[0, 3, 3, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div className="panel">
          <h4>Top Expense Categories</h4>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={byCategory} layout="vertical" margin={{ left: 20 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="var(--paper-line)" />
              <XAxis type="number" tick={{ fontSize: 10 }} />
              <YAxis type="category" dataKey="name" tick={{ fontSize: 9 }} width={150} />
              <Tooltip formatter={(v) => peso(v)} />
              <Bar dataKey="value" fill="#2F6B4F" radius={[0, 3, 3, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div className="panel">
          <h4>Monthly Expense Trend</h4>
          <ResponsiveContainer width="100%" height={220}>
            <LineChart data={monthlyTrend}>
              <CartesianGrid strokeDasharray="3 3" stroke="var(--paper-line)" />
              <XAxis dataKey="month" tick={{ fontSize: 11 }} />
              <YAxis tick={{ fontSize: 11 }} />
              <Tooltip formatter={(v) => peso(v)} />
              <Line type="monotone" dataKey="value" stroke="#C4272E" strokeWidth={2} dot={{ r: 3 }} />
            </LineChart>
          </ResponsiveContainer>
        </div>
        <div className="panel">
          <h4>Liquidation Status</h4>
          <ResponsiveContainer width="100%" height={220}>
            <PieChart>
              <Pie data={liquidationStatusData} dataKey="value" nameKey="name" outerRadius={80} label={(e) => e.name}>
                {liquidationStatusData.map((_, i) => <Cell key={i} fill={PIE_COLORS[i % PIE_COLORS.length]} />)}
              </Pie>
              <Tooltip />
              <Legend />
            </PieChart>
          </ResponsiveContainer>
        </div>
      </div>

      <div className="two-col">
        <div className="panel">
          <h4>Recent Transactions</h4>
          <table className="ledger-table compact">
            <thead><tr><th>Voucher</th><th>Employee</th><th>Branch</th><th>Amount</th><th>Status</th></tr></thead>
            <tbody>
              {recentTx.map((t) => (
                <tr key={t.id}>
                  <td className="mono">{t.voucherNo}</td>
                  <td>{t.employee}</td>
                  <td>{t.branch}</td>
                  <td className="mono num">{peso(t.amount)}</td>
                  <td><Stamp label={t.status} tone={toneForStatus(t.status)} /></td>
                </tr>
              ))}
              {recentTx.length === 0 && <tr><td colSpan={5} className="empty-row">No transactions yet</td></tr>}
            </tbody>
          </table>
        </div>
        <div className="panel">
          <h4>Recent Liquidations</h4>
          <table className="ledger-table compact">
            <thead><tr><th>Voucher</th><th>Lines</th><th>Total Liquidated</th></tr></thead>
            <tbody>
              {recentLiq.map((l) => {
                const d = disbursements.find((x) => x.id === l.id);
                return (
                  <tr key={l.id}>
                    <td className="mono">{d ? d.voucherNo : l.id}</td>
                    <td>{l.lines.length}</td>
                    <td className="mono num">{peso(l.total)}</td>
                  </tr>
                );
              })}
              {recentLiq.length === 0 && <tr><td colSpan={3} className="empty-row">No liquidations yet</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function RequestsModule({ requests, setRequests, master, notify }) {
  const [editing, setEditing] = useState(null);
  const [q, setQ] = useState("");
  const [statusFilter, setStatusFilter] = useState("All");

  const emptyForm = { requestNo: "", date: todayISO(), employee: "", department: master.subaccounts[0]?.code || "", branch: master.branches[0]?.code || "", company: master.companies[0]?.id || "", purpose: "", amount: "", approver: "", status: "Pending" };
  const [form, setForm] = useState(emptyForm);

  const filtered = requests.filter((r) => {
    const matchesQ = !q || [r.requestNo, r.employee, r.purpose].some((v) => (v || "").toLowerCase().includes(q.toLowerCase()));
    const matchesStatus = statusFilter === "All" || r.status === statusFilter;
    return matchesQ && matchesStatus;
  });

  function openNew() { setForm({ ...emptyForm, requestNo: uid("REQ") }); setEditing("new"); }
  function openEdit(r) { setForm(r); setEditing(r.id); }
  function save() {
    if (!form.employee || !form.amount) { notify("Employee and amount are required", "error"); return; }
    if (editing === "new") {
      setRequests([{ ...form, id: uid("REQ") }, ...requests]);
      notify("Request created");
    } else {
      setRequests(requests.map((r) => (r.id === editing ? { ...form, id: editing } : r)));
      notify("Request updated");
    }
    setEditing(null);
  }
  function remove(id) { setRequests(requests.filter((r) => r.id !== id)); notify("Request deleted", "error"); }

  const companyObj = master.companies.find((c) => c.id === form.company);
  const branchOptions = master.branches.filter((b) => !form.company || b.companyId === form.company);

  return (
    <div className="module">
      <div className="module-toolbar">
        <div className="search-box"><Search size={14} /><input placeholder="Search request no, employee, purpose..." value={q} onChange={(e) => setQ(e.target.value)} /></div>
        <select value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)}>
          {["All", "Pending", "Approved", "Rejected"].map((s) => <option key={s}>{s}</option>)}
        </select>
        <div className="spacer" />
        <button className="btn-primary" onClick={openNew}><Plus size={15} /> New Request</button>
      </div>

      <table className="ledger-table">
        <thead>
          <tr><th>Request No.</th><th>Date</th><th>Employee</th><th>Department</th><th>Branch</th><th>Company</th><th>Purpose</th><th>Amount</th><th>Approver</th><th>Status</th><th></th></tr>
        </thead>
        <tbody>
          {filtered.map((r) => (
            <tr key={r.id}>
              <td className="mono">{r.requestNo}</td>
              <td>{fmtDate(r.date)}</td>
              <td>{r.employee}</td>
              <td>{master.subaccounts.find((s) => s.code === r.department)?.name || r.department}</td>
              <td>{r.branch}</td>
              <td>{master.companies.find((c) => c.id === r.company)?.name || r.company}</td>
              <td className="truncate">{r.purpose}</td>
              <td className="mono num">{peso(r.amount)}</td>
              <td>{r.approver}</td>
              <td><Stamp label={r.status} tone={toneForStatus(r.status)} /></td>
              <td className="row-actions">
                <button className="icon-btn" onClick={() => openEdit(r)}><Pencil size={14} /></button>
                <button className="icon-btn danger" onClick={() => remove(r.id)}><Trash2 size={14} /></button>
              </td>
            </tr>
          ))}
          {filtered.length === 0 && <tr><td colSpan={11} className="empty-row">No requests found</td></tr>}
        </tbody>
      </table>

      {editing && (
        <Modal title={editing === "new" ? "New Petty Cash Request" : "Edit Request"} onClose={() => setEditing(null)}>
          <div className="form-grid">
            <Field label="Request No."><input value={form.requestNo} className="mono" onChange={(e) => setForm({ ...form, requestNo: e.target.value })} /></Field>

              </select>
            </Field>

              <select value={form.branch} onChange={(e) => setForm({ ...form, branch: e.target.value })}>
                {branchOptions.map((b) => <option key={b.code} value={b.code}>{b.name}</option>)}
              </select>
            </Field>
            <Field label="Department">
              <SearchableSelect value={form.department} onChange={(v) => setForm({ ...form, department: v })} options={master.subaccounts} placeholder="Select department" />

            <Field label="Amount Requested"><input type="number" step="0.01" value={form.amount} onChange={(e) => setForm({ ...form, amount: e.target.value })} /></Field>
            <Field label="Approver"><input value={form.approver} onChange={(e) => setForm({ ...form, approver: e.target.value })} /></Field>
            <Field label="Status">
              <select value={form.status} onChange={(e) => setForm({ ...form, status: e.target.value })}>
                {["Pending", "Approved", "Rejected"].map((s) => <option key={s}>{s}</option>)}
              </select>
            </Field>
            <div className="field field-wide"><span className="field-label">Purpose</span>
              <textarea rows={2} value={form.purpose} onChange={(e) => setForm({ ...form, purpose: e.target.value })} />
            </div>
          </div>
          <div className="modal-actions">
            <button className="btn-ghost" onClick={() => setEditing(null)}>Cancel</button>
            <button className="btn-primary" onClick={save}><Save size={14} /> Save Request</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ============================== DISBURSEMENT LEDGER MODULE ============================== */
function DisbursementsModule({ disbursements, setDisbursements, liquidations, requests, master, notify }) {
  const [editing, setEditing] = useState(null);
  const [q, setQ] = useState("");
  const [branchFilter, setBranchFilter] = useState("All");

  const emptyForm = { voucherNo: "", date: todayISO(), employee: "", branch: master.branches[0]?.code || "", company: master.companies[0]?.id || "", department: master.subaccounts[0]?.code || "", expenseCategory: master.coa[0]?.name || "", amount: "", status: "Disbursed", remarks: "" };
  const [form, setForm] = useState(emptyForm);

  function liqTotalFor(id) { const l = liquidations[id]; return l ? l.lines.reduce((s, x) => s + Number(x.amount || 0), 0) : 0; }
  function liqStatusFor(d) {
    const t = liqTotalFor(d.id); const amt = Number(d.amount || 0);
    if (t === 0) return "Pending Liquidation";
    if (t < amt) return "Partially Liquidated";
    if (t === amt) return "Liquidated";
    return "Over-Liquidated";
  }

  const filtered = disbursements.filter((d) => {
    const matchesQ = !q || [d.voucherNo, d.employee, d.remarks].some((v) => (v || "").toLowerCase().includes(q.toLowerCase()));
    const matchesBranch = branchFilter === "All" || d.branch === branchFilter;
    return matchesQ && matchesBranch;
  });

  function openNew() { setForm({ ...emptyForm, voucherNo: uid("V") }); setEditing("new"); }
  function openEdit(d) { setForm(d); setEditing(d.id); }
  function save() {
    if (!form.employee || !form.amount) { notify("Employee and amount are required", "error"); return; }
    if (editing === "new") { setDisbursements([{ ...form, id: uid("DISB") }, ...disbursements]); notify("Disbursement recorded"); }
    else { setDisbursements(disbursements.map((d) => (d.id === editing ? { ...form, id: editing } : d))); notify("Disbursement updated"); }
    setEditing(null);
  }
  function remove(id) { setDisbursements(disbursements.filter((d) => d.id !== id)); notify("Disbursement deleted", "error"); }

  function exportExcel() {
    const rows = filtered.map((d) => ({
      "Voucher No.": d.voucherNo, "Date": d.date, "Employee": d.employee, "Branch": d.branch,
      "Company": master.companies.find((c) => c.id === d.company)?.name || d.company,
      "Department": master.subaccounts.find((s) => s.code === d.department)?.name || d.department,
      "Expense Category": d.expenseCategory, "Amount": Number(d.amount || 0), "Status": d.status,
      "Liquidation Status": liqStatusFor(d), "Remarks": d.remarks,
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Disbursement Ledger");
    XLSX.writeFile(wb, `Disbursement_Ledger_${todayISO()}.xlsx`);
    notify("Excel exported");
  }

  return (
    <div className="module">
      <div className="module-toolbar">
        <div className="search-box"><Search size={14} /><input placeholder="Search voucher, employee, remarks..." value={q} onChange={(e) => setQ(e.target.value)} /></div>
        <select value={branchFilter} onChange={(e) => setBranchFilter(e.target.value)}>
          <option>All</option>
          {master.branches.map((b) => <option key={b.code} value={b.code}>{b.code}</option>)}
        </select>
        <div className="spacer" />
        <button className="btn-ghost" onClick={exportExcel}><Download size={14} /> Export Excel</button>
        <button className="btn-ghost" onClick={() => window.print()}><Printer size={14} /> Print</button>
        <button className="btn-primary" onClick={openNew}><Plus size={15} /> New Disbursement</button>
      </div>

      <table className="ledger-table">
        <thead>
          <tr><th>Voucher No.</th><th>Date</th><th>Employee</th><th>Branch</th><th>Company</th><th>Department</th><th>Expense Category</th><th>Amount</th><th>Status</th><th>Liquidation</th><th>Remarks</th><th></th></tr>
        </thead>
        <tbody>
          {filtered.map((d) => (
            <tr key={d.id}>
              <td className="mono">{d.voucherNo}</td>
              <td>{fmtDate(d.date)}</td>
              <td>{d.employee}</td>
              <td>{d.branch}</td>
              <td>{master.companies.find((c) => c.id === d.company)?.name || d.company}</td>
              <td>{master.subaccounts.find((s) => s.code === d.department)?.name || d.department}</td>
              <td>{d.expenseCategory}</td>
              <td className="mono num">{peso(d.amount)}</td>
              <td><Stamp label={d.status} tone={toneForStatus(d.status)} /></td>
              <td><Stamp label={liqStatusFor(d)} tone={toneForStatus(liqStatusFor(d))} /></td>
              <td className="truncate">{d.remarks}</td>
              <td className="row-actions">
                <button className="icon-btn" onClick={() => openEdit(d)}><Pencil size={14} /></button>
                <button className="icon-btn danger" onClick={() => remove(d.id)}><Trash2 size={14} /></button>
              </td>
            </tr>
          ))}
          {filtered.length === 0 && <tr><td colSpan={12} className="empty-row">No disbursements found</td></tr>}
        </tbody>
      </table>

      {editing && (
        <Modal title={editing === "new" ? "New Disbursement" : "Edit Disbursement"} onClose={() => setEditing(null)}>
          <div className="form-grid">
            <Field label="Voucher No."><input value={form.voucherNo} className="mono" onChange={(e) => setForm({ ...form, voucherNo: e.target.value })} /></Field>
            <Field label="Date"><input type="date" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} /></Field>
            <Field label="Employee"><input value={form.employee} onChange={(e) => setForm({ ...form, employee: e.target.value })} /></Field>
            <Field label="Company">
              <select value={form.company} onChange={(e) => setForm({ ...form, company: e.target.value })}>
                {master.companies.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </Field>
            <Field label="Branch">
              <select value={form.branch} onChange={(e) => setForm({ ...form, branch: e.target.value })}>
                {master.branches.map((b) => <option key={b.code} value={b.code}>{b.name}</option>)}
              </select>
            </Field>
            <Field label="Department">
              <SearchableSelect value={form.department} onChange={(v) => setForm({ ...form, department: v })} options={master.subaccounts} placeholder="Select department" />
            </Field>
            <Field label="Expense Category">
              <SearchableSelect value={form.expenseCategory} onChange={(v) => setForm({ ...form, expenseCategory: v })} options={master.coa} getValue={(o) => o.name} placeholder="Select category" />
            </Field>
            <Field label="Amount"><input type="number" step="0.01" value={form.amount} onChange={(e) => setForm({ ...form, amount: e.target.value })} /></Field>
            <Field label="Status">
              <select value={form.status} onChange={(e) => setForm({ ...form, status: e.target.value })}>
                {["Disbursed", "Closed"].map((s) => <option key={s}>{s}</option>)}
              </select>
            </Field>
            <div className="field field-wide"><span className="field-label">Remarks</span>
              <textarea rows={2} value={form.remarks} onChange={(e) => setForm({ ...form, remarks: e.target.value })} />
            </div>
          </div>
          <div className="modal-actions">
            <button className="btn-ghost" onClick={() => setEditing(null)}>Cancel</button>
            <button className="btn-primary" onClick={save}><Save size={14} /> Save Disbursement</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ============================== LIQUIDATION MODULE ============================== */
function LiquidationModule({ disbursements, liquidations, setLiquidations, master, notify }) {
  const [activeId, setActiveId] = useState(disbursements[0]?.id || null);
  const [q, setQ] = useState("");

  const filteredDisb = disbursements.filter((d) => !q || [d.voucherNo, d.employee].some((v) => (v || "").toLowerCase().includes(q.toLowerCase())));
  const active = disbursements.find((d) => d.id === activeId);
  const liq = liquidations[activeId] || { lines: [], remarks: "" };

  const totalLiquidated = liq.lines.reduce((s, l) => s + Number(l.amount || 0), 0);
  const remaining = active ? Number(active.amount || 0) - totalLiquidated : 0;
  const liqStatus = !active ? "" : remaining > 0 ? "Under-Liquidation" : remaining < 0 ? "Over-Liquidation" : "Fully Liquidated";

  function updateLiq(newLines, remarks = liq.remarks) {
    setLiquidations({ ...liquidations, [activeId]: { lines: newLines, remarks } });
  }
  function addLine() {
    updateLiq([...liq.lines, { id: uid("LN"), date: todayISO(), expense: "", coa: master.coa[0]?.name || "", department: master.subaccounts[0]?.code || "", amount: "" }]);
  }
  function updateLine(id, patch) { updateLiq(liq.lines.map((l) => (l.id === id ? { ...l, ...patch } : l))); }
  function removeLine(id) { updateLiq(liq.lines.filter((l) => l.id !== id)); notify("Line removed", "error"); }

  function exportLiquidationExcel() {
    if (!active) return;
    const rows = liq.lines.map((l) => ({
      Company: master.companies.find((c) => c.id === active.company)?.name || active.company,
      Branch: active.branch,
      Account: l.coa,
      Subaccount: master.subaccounts.find((s) => s.code === l.department)?.name || l.department,
      Description: l.expense,
      Amount: Number(l.amount || 0),
      "Reference Number": active.voucherNo,
      Employee: active.employee,
      Date: l.date,
      Currency: "PHP",
      Project: "",
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Acumatica Upload");
    XLSX.writeFile(wb, `Liquidation_${active.voucherNo}_${todayISO()}.xlsx`);
    notify("Acumatica-ready Excel exported");
  }

  function exportAllLiquidationsExcel() {
    const rows = [];
    disbursements.forEach((d) => {
      const l = liquidations[d.id];
      if (!l) return;
      l.lines.forEach((ln) => {
        rows.push({
          Company: master.companies.find((c) => c.id === d.company)?.name || d.company,
          Branch: d.branch,
          Account: ln.coa,
          Subaccount: master.subaccounts.find((s) => s.code === ln.department)?.name || ln.department,
          Description: ln.expense,
          Amount: Number(ln.amount || 0),
          "Reference Number": d.voucherNo,
          Employee: d.employee,
          Date: ln.date,
          Currency: "PHP",
          Project: "",
        });
      });
    });
    if (rows.length === 0) { notify("No liquidation lines to export", "error"); return; }
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Acumatica Upload");
    XLSX.writeFile(wb, `All_Liquidations_${todayISO()}.xlsx`);
    notify("Acumatica-ready Excel exported");
  }

  return (
    <div className="module liq-module">
      <div className="liq-sidebar">
        <div className="search-box"><Search size={14} /><input placeholder="Search voucher / employee" value={q} onChange={(e) => setQ(e.target.value)} /></div>
        <div className="liq-list">
          {filteredDisb.map((d) => {
            const l = liquidations[d.id];
            const t = l ? l.lines.reduce((s, x) => s + Number(x.amount || 0), 0) : 0;
            const amt = Number(d.amount || 0);
            const status = t === 0 ? "Pending" : t < amt ? "Partial" : t === amt ? "Done" : "Over";
            return (
              <div key={d.id} className={`liq-list-item ${activeId === d.id ? "active" : ""}`} onClick={() => setActiveId(d.id)}>
                <div className="liq-list-top"><span className="mono">{d.voucherNo}</span><Stamp label={status} tone={toneForStatus(status === "Done" ? "Liquidated" : status === "Partial" ? "Partially Liquidated" : status === "Over" ? "Over-Liquidated" : "Pending")} /></div>
                <div className="liq-list-sub">{d.employee} &middot; {peso(d.amount)}</div>
              </div>
            );
          })}
          {filteredDisb.length === 0 && <div className="empty-row">No disbursements</div>}
        </div>
        <button className="btn-ghost full-w" onClick={exportAllLiquidationsExcel}><Download size={14} /> Export All (Acumatica)</button>
      </div>

      <div className="liq-main">
        {!active ? (
          <div className="empty-row" style={{ padding: 40 }}>Select a disbursement to liquidate</div>
        ) : (
          <>
            <div className="liq-header">
              <div>
                <h3>Liquidation &mdash; {active.voucherNo}</h3>
                <div className="liq-meta">{active.employee} &middot; {active.branch} &middot; {fmtDate(active.date)}</div>
              </div>
              <div className="liq-amounts">
                <div><span>Requested Amount</span><strong>{peso(active.amount)}</strong></div>
                <div><span>Total Liquidated</span><strong>{peso(totalLiquidated)}</strong></div>
                <div className={remaining < 0 ? "neg" : ""}><span>{remaining >= 0 ? "Remaining Cash" : "Over-Liquidated By"}</span><strong>{peso(Math.abs(remaining))}</strong></div>
              </div>
              <Stamp label={liqStatus} tone={remaining > 0 ? "brass" : remaining < 0 ? "red" : "green"} />
            </div>

            <table className="ledger-table">
              <thead><tr><th>Date</th><th>Expense</th><th>COA</th><th>Department</th><th>Amount</th><th></th></tr></thead>
              <tbody>
                {liq.lines.map((l) => (
                  <tr key={l.id}>
                    <td><input type="date" value={l.date} onChange={(e) => updateLine(l.id, { date: e.target.value })} /></td>
                    <td><input value={l.expense} onChange={(e) => updateLine(l.id, { expense: e.target.value })} placeholder="e.g. Meals" /></td>
                    <td><SearchableSelect value={l.coa} onChange={(v) => updateLine(l.id, { coa: v })} options={master.coa} getValue={(o) => o.name} placeholder="COA" /></td>
                    <td><SearchableSelect value={l.department} onChange={(v) => updateLine(l.id, { department: v })} options={master.subaccounts} placeholder="Dept." /></td>
                    <td><input type="number" step="0.01" className="mono num" value={l.amount} onChange={(e) => updateLine(l.id, { amount: e.target.value })} /></td>
                    <td><button className="icon-btn danger" onClick={() => removeLine(l.id)}><Trash2 size={14} /></button></td>
                  </tr>
                ))}
                {liq.lines.length === 0 && <tr><td colSpan={6} className="empty-row">No receipts added yet</td></tr>}
              </tbody>
            </table>

            <div className="liq-footer-actions">
              <button className="btn-ghost" onClick={addLine}><Plus size={14} /> Add Receipt Line</button>
              <div className="spacer" />
              <button className="btn-ghost" onClick={exportLiquidationExcel}><Download size={14} /> Export This Liquidation</button>
            </div>

            <Field label="Remarks / Notes">
              <textarea rows={2} value={liq.remarks} onChange={(e) => updateLiq(liq.lines, e.target.value)} />
            </Field>
          </>
        )}
      </div>
    </div>
  );
}

/* ============================== PURCHASE ORDER MODULE ============================== */
function PurchaseOrdersModule({ pos, setPos, requests, master, notify }) {
  const [editing, setEditing] = useState(null);
  const [q, setQ] = useState("");
  const emptyForm = {
    poNumber: "", date: todayISO(), employee: "",
    branch: master.branches[0]?.code || "",
    department: master.subaccounts[0]?.code || "",
    account: "", expenseCategory: master.coa[0]?.name || "",
    lineDescription: "", lineType: "Service", uom: "PC", orderQty: "1", unitCost: "",
    supplier: "", amount: "", status: "Open", linkedRequest: "", liquidationStatus: "Pending"
  };
  const [form, setForm] = useState(emptyForm);

  const filtered = pos.filter((p) => !q || [p.poNumber, p.employee, p.supplier].some((v) => (v || "").toLowerCase().includes(q.toLowerCase())));

  function openNew() { setForm({ ...emptyForm, poNumber: uid("PO") }); setEditing("new"); }
  function openEdit(p) { setForm({ ...emptyForm, ...p, orderQty: p.orderQty ?? "1", unitCost: (p.unitCost ?? p.amount ?? "") }); setEditing(p.id); }
  function save() {
    const qty = Number(form.orderQty || 0), unit = Number(form.unitCost || 0);
    if (!form.lineDescription || !unit) { notify("Line description and unit cost are required", "error"); return; }
    const rec = { ...form, orderQty: qty, unitCost: unit, amount: qty * unit };
    if (editing === "new") { setPos([{ ...rec, id: uid("POR") }, ...pos]); notify("Purchase order created"); }
    else { setPos(pos.map((p) => (p.id === editing ? { ...rec, id: editing } : p))); notify("Purchase order updated"); }
    setEditing(null);
  }
  function remove(id) { setPos(pos.filter((p) => p.id !== id)); notify("Purchase order deleted", "error"); }

  // ISO date -> M/D/YYYY (e.g. "2026-07-14" -> "7/14/2026"), no timezone shift
  const mdy = (iso) => { if (!iso) return ""; const [y, m, d] = String(iso).split("-"); return `${Number(m)}/${Number(d)}/${y}`; };

  // Column order and fixed defaults follow the Purchase Orders Template exactly.
  function exportAcumaticaTemplate() {
    const rows = filtered.map((p) => {
      const qty = Number(p.orderQty || 1);
      const unit = Number(p.unitCost !== undefined && p.unitCost !== "" ? p.unitCost : p.amount || 0);
      const ext = qty * unit;
      const when = mdy(p.date);
      return {
        Branch: p.branch || "",
        "Inventory ID": "",
        "Sub.": p.department || "",
        Account: p.account || "",
        Description: p.expenseCategory || "",
        "Line Description": p.lineDescription || "",
        UOM: p.uom || "PC",
        "Order Qty.": qty,
        "Unit Cost": unit,
        "Ext. Cost": ext,
        Amount: ext,
        "Qty. On Receipts": 0,
        "Discount Percent": 0,
        "Line Type": p.lineType || "Service",
        Warehouse: "",
        "Discount Amount": 0,
        "Manual Discount": "True",
        "Discount Code": "",
        "Prepaid Qty.": 0,
        "Prepaid Amount": 0,
        "Alternate ID": "",
        "Min. Receipt (%)": 0,
        "Max. Receipt (%)": 100,
        "Receipt Action": "Accept but Warn",
        "Complete On (%)": 100,
        "Tax Category": "",
        "Accrual Account": "",
        "Accrual Sub.": "",
        Requested: when,
        Promised: when,
        Completed: "False",
        Cancelled: "False",
        Closed: "False",
        "Billed Qty.": 0,
        "Billed Amount": 0,
        "Unbilled Qty.": qty,
        "Unbilled Amount": ext,
        "Blanket PO Type": "",
        "Blanket PO Nbr.": "",
        "Billing Based On": "Order",
      };
    });
    if (rows.length === 0) { notify("No purchase orders to export", "error"); return; }
    const header = [
      "Branch", "Inventory ID", "Sub.", "Account", "Description", "Line Description", "UOM", "Order Qty.",
      "Unit Cost", "Ext. Cost", "Amount", "Qty. On Receipts", "Discount Percent", "Line Type", "Warehouse",
      "Discount Amount", "Manual Discount", "Discount Code", "Prepaid Qty.", "Prepaid Amount", "Alternate ID",
      "Min. Receipt (%)", "Max. Receipt (%)", "Receipt Action", "Complete On (%)", "Tax Category",
      "Accrual Account", "Accrual Sub.", "Requested", "Promised", "Completed", "Cancelled", "Closed",
      "Billed Qty.", "Billed Amount", "Unbilled Qty.", "Unbilled Amount", "Blanket PO Type", "Blanket PO Nbr.",
      "Billing Based On",
    ];
    const ws = XLSX.utils.json_to_sheet(rows, { header });
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Purchase Orders Template");
    XLSX.writeFile(wb, `Purchase_Orders_${todayISO()}.xlsx`);
    notify("PO template exported");
  }

  return (
    <div className="module">
      <div className="module-toolbar">
        <div className="search-box"><Search size={14} /><input placeholder="Search PO no, employee, supplier..." value={q} onChange={(e) => setQ(e.target.value)} /></div>
        <div className="spacer" />
        <button className="btn-ghost" onClick={exportAcumaticaTemplate}><Download size={14} /> Export Acumatica Template</button>
        <button className="btn-primary" onClick={openNew}><Plus size={15} /> New PO</button>
      </div>
      <table className="ledger-table">
        <thead><tr><th>PO Number</th><th>Employee</th><th>Department</th><th>Branch</th><th>Supplier</th><th>Amount</th><th>Status</th><th>Linked Request</th><th>Liquidation</th><th></th></tr></thead>
        <tbody>
          {filtered.map((p) => (
            <tr key={p.id}>
              <td className="mono">{p.poNumber}</td>
              <td>{p.employee}</td>
              <td>{master.subaccounts.find((s) => s.code === p.department)?.name || p.department}</td>
              <td>{p.branch}</td>
              <td>{p.supplier}</td>
              <td className="mono num">{peso(p.amount)}</td>
              <td><Stamp label={p.status} tone={toneForStatus(p.status)} /></td>
              <td className="mono">{p.linkedRequest || "\u2014"}</td>
              <td><Stamp label={p.liquidationStatus} tone={toneForStatus(p.liquidationStatus === "Pending" ? "Pending" : "Liquidated")} /></td>
              <td className="row-actions">
                <button className="icon-btn" onClick={() => openEdit(p)}><Pencil size={14} /></button>
                <button className="icon-btn danger" onClick={() => remove(p.id)}><Trash2 size={14} /></button>
              </td>

          {filtered.length === 0 && <tr><td colSpan={10} className="empty-row">No purchase orders found</td></tr>}
        </tbody>
      </table>

      {editing && (
        <Modal title={editing === "new" ? "New Purchase Order" : "Edit Purchase Order"} onClose={() => setEditing(null)}>
          <div className="form-grid">

            <Field label="Expense Account (Description)">
              <SearchableSelect value={form.expenseCategory} onChange={(v) => setForm({ ...form, expenseCategory: v })} options={master.coa} getValue={(o) => o.name} placeholder="Select account" />

/* ============================== MASTER FILES MODULE ============================== */
function GenericMasterTable({ items, setItems, columns, notify, label, idKey = "code" }) {
  const [editing, setEditing] = useState(null);
  const [q, setQ] = useState("");
  const emptyForm = columns.reduce((acc, c) => ({ ...acc, [c.key]: "" }), {});
  const [form, setForm] = useState(emptyForm);

  const filtered = items.filter((it) => !q || columns.some((c) => String(it[c.key] || "").toLowerCase().includes(q.toLowerCase())));

  function openNew() { setForm(emptyForm); setEditing("new"); }
  function openEdit(it) { setForm(it); setEditing(it[idKey]); }
  function save() {
    if (!form[idKey]) { notify(`${columns[0].label} is required`, "error"); return; }
    const dupe = items.some((it) => it[idKey] === form[idKey] && it[idKey] !== editing);
    if (dupe) { notify("That code is already in use by another record", "error"); return; }
    if (editing === "new") {
      setItems([...items, form]); notify(`${label} added`);
    } else {
      setItems(items.map((it) => (it[idKey] === editing ? form : it))); notify(`${label} updated`);
    }
    setEditing(null);
  }
  function remove(key) { setItems(items.filter((it) => it[idKey] !== key)); notify(`${label} removed`, "error"); }

  return (
    <div className="module">
      <div className="module-toolbar">
        <div className="search-box"><Search size={14} /><input placeholder={`Search ${label.toLowerCase()}...`} value={q} onChange={(e) => setQ(e.target.value)} /></div>
        <span className="count-pill">{filtered.length} of {items.length}</span>
        <div className="spacer" />
        <button className="btn-primary" onClick={openNew}><Plus size={15} /> Add {label}</button>
      </div>
      <table className="ledger-table">
        <thead><tr>{columns.map((c) => <th key={c.key}>{c.label}</th>)}<th></th></tr></thead>
        <tbody>
          {filtered.slice(0, 250).map((it) => (
            <tr key={it[idKey]}>
              {columns.map((c) => <td key={c.key} className={c.mono ? "mono" : ""}>{it[c.key]}</td>)}
              <td className="row-actions">
                <button className="icon-btn" onClick={() => openEdit(it)}><Pencil size={14} /></button>
                <button className="icon-btn danger" onClick={() => remove(it[idKey])}><Trash2 size={14} /></button>
              </td>
            </tr>
          ))}
          {filtered.length === 0 && <tr><td colSpan={columns.length + 1} className="empty-row">No records found</td></tr>}
        </tbody>
      </table>
      {filtered.length > 250 && <div className="hint-note">Showing first 250 of {filtered.length} &mdash; refine your search to see more.</div>}

      {editing && (
        <Modal title={editing === "new" ? `Add ${label}` : `Edit ${label}`} onClose={() => setEditing(null)}>
          <div className="form-grid">
            {columns.map((c) => (
              <Field key={c.key} label={c.label}>
                <input value={form[c.key] || ""} onChange={(e) => setForm({ ...form, [c.key]: e.target.value })} />
              </Field>
            ))}
          </div>
          <div className="modal-actions">
            <button className="btn-ghost" onClick={() => setEditing(null)}>Cancel</button>
            <button className="btn-primary" onClick={save}><Save size={14} /> Save</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ============================== REPORTS MODULE ============================== */
function ReportsModule({ data, master, notify }) {
  const { requests, disbursements, liquidations, plants } = data;
  const [groupBy, setGroupBy] = useState("branch");
  const [dateFrom, setDateFrom] = useState("");
  const [dateTo, setDateTo] = useState("");

  const inRange = (d) => (!dateFrom || d.date >= dateFrom) && (!dateTo || d.date <= dateTo);
  const filteredDisb = disbursements.filter(inRange);

  const grouped = useMemo(() => {
    const m = {};
    filteredDisb.forEach((d) => {
      let key;
      if (groupBy === "branch") key = d.branch;
      else if (groupBy === "company") key = master.companies.find((c) => c.id === d.company)?.name || d.company;
      else if (groupBy === "department") key = master.subaccounts.find((s) => s.code === d.department)?.name || d.department;
      else if (groupBy === "employee") key = d.employee;
      else if (groupBy === "category") key = d.expenseCategory;
      else key = "All";
      if (!m[key]) m[key] = { count: 0, amount: 0, liquidated: 0 };
      m[key].count++; m[key].amount += Number(d.amount || 0);
      const liq = liquidations[d.id];
      m[key].liquidated += liq ? liq.lines.reduce((s, l) => s + Number(l.amount || 0), 0) : 0;
    });
    return Object.entries(m).map(([key, v]) => ({ key, ...v })).sort((a, b) => b.amount - a.amount);
  }, [filteredDisb, groupBy, liquidations, master]);

  const pendingReqs = requests.filter((r) => r.status === "Pending");
  const pendingLiqs = filteredDisb.filter((d) => {
    const liq = liquidations[d.id]; const t = liq ? liq.lines.reduce((s, l) => s + Number(l.amount || 0), 0) : 0;
    return t < Number(d.amount || 0);
  });

  function exportReport() {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(grouped.map((g) => ({ [groupBy]: g.key, Count: g.count, "Total Disbursed": g.amount, "Total Liquidated": g.liquidated }))), "Summary");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(pendingReqs), "Pending Requests");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(pendingLiqs), "Pending Liquidations");
    XLSX.writeFile(wb, `PCF_Report_${todayISO()}.xlsx`);
    notify("Report exported");
  }

  return (
    <div className="module">
      <div className="module-toolbar">
        <span className="field-label" style={{ marginRight: 4 }}>Group by</span>
        <select value={groupBy} onChange={(e) => setGroupBy(e.target.value)}>
          <option value="branch">Branch</option><option value="company">Company</option>
          <option value="department">Department</option><option value="employee">Employee</option>
          <option value="category">Expense Category</option>
        </select>
        <span className="field-label">From</span>
        <input type="date" value={dateFrom} onChange={(e) => setDateFrom(e.target.value)} />
        <span className="field-label">To</span>
        <input type="date" value={dateTo} onChange={(e) => setDateTo(e.target.value)} />
        <div className="spacer" />
        <button className="btn-ghost" onClick={exportReport}><Download size={14} /> Export Report</button>
      </div>

      <table className="ledger-table">
        <thead><tr><th style={{ textTransform: "capitalize" }}>{groupBy}</th><th>Transactions</th><th>Total Disbursed</th><th>Total Liquidated</th><th>Balance</th></tr></thead>
        <tbody>
          {grouped.map((g) => (
            <tr key={g.key}>
              <td>{g.key}</td><td>{g.count}</td><td className="mono num">{peso(g.amount)}</td>
              <td className="mono num">{peso(g.liquidated)}</td><td className="mono num">{peso(g.amount - g.liquidated)}</td>
            </tr>
          ))}
          {grouped.length === 0 && <tr><td colSpan={5} className="empty-row">No data in this range</td></tr>}
        </tbody>
      </table>

      <div className="two-col" style={{ marginTop: 20 }}>
        <div className="panel">
          <h4>Pending Requests ({pendingReqs.length})</h4>
          <table className="ledger-table compact">
            <thead><tr><th>Request No.</th><th>Employee</th><th>Amount</th></tr></thead>
            <tbody>
              {pendingReqs.slice(0, 8).map((r) => <tr key={r.id}><td className="mono">{r.requestNo}</td><td>{r.employee}</td><td className="mono num">{peso(r.amount)}</td></tr>)}
              {pendingReqs.length === 0 && <tr><td colSpan={3} className="empty-row">None</td></tr>}
            </tbody>
          </table>
        </div>
        <div className="panel">
          <h4>Pending Liquidations ({pendingLiqs.length})</h4>
          <table className="ledger-table compact">
            <thead><tr><th>Voucher</th><th>Employee</th><th>Amount</th></tr></thead>
            <tbody>
              {pendingLiqs.slice(0, 8).map((d) => <tr key={d.id}><td className="mono">{d.voucherNo}</td><td>{d.employee}</td><td className="mono num">{peso(d.amount)}</td></tr>)}
              {pendingLiqs.length === 0 && <tr><td colSpan={3} className="empty-row">None</td></tr>}
            </tbody>
          </table>
        </div>
      </div>

      <div className="panel" style={{ marginTop: 20 }}>
        <h4>Petty Cash Funds by Custodian</h4>
        <table className="ledger-table compact">
          <thead><tr><th>Plant</th><th>Custodian</th><th>Branch</th><th>Beginning Balance</th></tr></thead>
          <tbody>
            {plants.map((p) => <tr key={p.id}><td>{p.plant}</td><td>{p.custodian}</td><td>{p.branchCode}</td><td className="mono num">{peso(p.beginningBalance)}</td></tr>)}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ============================== PCF MONITORING REPORT ============================== */
function MonitoringModule({ data, master }) {
  const { disbursements, liquidations, requests, plants } = data;

  const asOf = new Date().toLocaleDateString("en-PH", { year: "numeric", month: "long", day: "numeric" });

  // "A1+ (Manila)" -> "Manila", "Starkson (Disney)" -> "Disney", "Warner" -> "Warner"
  const shortName = (p) => {
    const m = (p.plant || "").match(/\(([^)]+)\)/);
    return (m ? m[1] : (p.plant || "")).trim();
  };

  // Group plants by company so related plants read together (Manila, Warner, then Disney).
  const ordered = useMemo(
    () => plants.slice().sort((a, b) => String(a.companyId).localeCompare(String(b.companyId))),
    [plants]
  );

  const rows = useMemo(() => ordered.map((p) => {
    const disb = disbursements.filter((d) => d.branch === p.branchCode);
    const beginning = Number(p.beginningBalance || 0);
    const totalDisbursed = disb.reduce((s, d) => s + Number(d.amount || 0), 0);
    let completedBilled = 0, unliquidated = 0;
    disb.forEach((d) => {
      const amt = Number(d.amount || 0);
      const liq = liquidations[d.id];
      const t = liq ? liq.lines.reduce((s, l) => s + Number(l.amount || 0), 0) : 0;
      if (liq && liq.lines.length > 0 && t >= amt) completedBilled += amt;
      else unliquidated += amt;
    });
    const pendingRequested = requests
      .filter((r) => r.branch === p.branchCode && r.status === "Pending")
      .reduce((s, r) => s + Number(r.amount || 0), 0);
    const company = master.companies.find((c) => c.id === p.companyId);
    return {
      id: p.id,
      title: shortName(p).toUpperCase(),
      company: company ? company.name : p.companyId,
      custodian: p.custodian,
      beginning, totalDisbursed, completedBilled, unliquidated, pendingRequested,
      available: beginning - totalDisbursed,
      count: disb.length,
    };
  }), [ordered, disbursements, liquidations, requests, master]);

  const names = ordered.map(shortName);
  const nameList = names.length <= 1
    ? (names[0] || "")
    : names.slice(0, -1).join(", ") + " and " + names[names.length - 1];

  return (
    <div className="module pcfmon">
      <style>{PCFMON_CSS}</style>
      <div className="module-toolbar">
        <div className="spacer" />
        <button className="btn-ghost" onClick={() => window.print()}><Printer size={14} /> Print</button>
      </div>

      <div className="pcfmon-head">
        <h1 className="pcfmon-title">PCF Monitoring Report</h1>
        <p className="pcfmon-sub">Beginning balance, disbursements and available balance for {nameList} &mdash; as of {asOf}.</p>
      </div>

      <div className="pcfmon-grid">
        {rows.map((r) => (
          <div className="pcfmon-card" key={r.id}>
            <div className="pcfmon-card-name">{r.title}</div>
            <div className="pcfmon-card-meta">{r.company} · Custodian: {r.custodian}</div>
            <div className="pcfmon-line"><span>Beginning Balance</span><b className="mono">{peso(r.beginning)}</b></div>
            <div className="pcfmon-line"><span>Total Disbursed</span><b className="mono">{peso(r.totalDisbursed)}</b></div>
            <div className="pcfmon-line"><span>Completed &amp; Billed</span><b className="mono">{peso(r.completedBilled)}</b></div>
            <div className="pcfmon-line"><span>Pending / Requested</span><b className="mono">{peso(r.pendingRequested)}</b></div>
            <div className="pcfmon-line"><span>Unliquidated (disbursed, no OR yet)</span><b className="mono">{peso(r.unliquidated)}</b></div>
            <div className="pcfmon-line pcfmon-total"><span>Available Balance</span><b className="mono">{peso(r.available)}</b></div>
            <div className="pcfmon-foot">{r.count} transaction{r.count === 1 ? "" : "s"} on file for this plant</div>
          </div>
        ))}
        {rows.length === 0 && <div className="empty-row" style={{ padding: 40 }}>No petty cash funds defined yet.</div>}
      </div>
    </div>
  );
}

.pcf-app.dark .pcfmon-title { color: var(--text); }

.pcfmon-card { background: var(--paper-2); border: 1px solid var(--paper-line); border-radius: 12px; padding: 20px 22px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
