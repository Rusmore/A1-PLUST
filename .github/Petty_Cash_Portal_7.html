<html lang="en">
<head>

     the single official Petty Cash Portal. This page forwards there.

     lines to restore this standalone portal.)

<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --navy:#132A42;
    --navy-2:#1F3D5C;
    --navy-3:#2C5478;
    --gold:#B8842B;
    --gold-light:#F4E8D0;
    --bg:#F6F4EF;
    --card:#FFFFFF;
    --ink:#1C1F24;
    --muted:#6B7280;
    --muted-2:#9CA3AF;
    --green:#2F6B3A;
    --green-bg:#E4F1E6;
    --red:#B3261E;
    --red-bg:#FBEAE9;
    --gold-bg:#FBF1DC;
    --border:#E4E0D6;
    --border-2:#D8D3C6;
    --radius:10px;
    --shadow: 0 1px 2px rgba(19,42,66,0.06), 0 4px 16px rgba(19,42,66,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',-apple-system,sans-serif;
    font-size:14px;
    line-height:1.45;
  }
  .num{font-family:'IBM Plex Mono',monospace; font-variant-numeric:tabular-nums;}
  h1,h2,h3{font-family:'Fraunces',serif; margin:0; font-weight:600;}

  /* ---------- Shell ---------- */
  .app{display:flex; flex-direction:column; min-height:100vh;}
  header.topbar{
    background:linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 100%);
    color:#fff;
    padding:18px 28px 0 28px;
  }
  .topbar-row{display:flex; align-items:flex-start; justify-content:space-between; gap:20px; flex-wrap:wrap;}
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-mark{
    width:40px;height:40px;border-radius:9px;
    background:var(--gold);
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif; font-weight:700; color:var(--navy); font-size:18px;
    flex-shrink:0;
  }
  .brand-text h1{font-size:21px; color:#fff; letter-spacing:0.2px;}
  .brand-text p{margin:2px 0 0 0; font-size:12px; color:#C7D3E0; font-weight:500;}
  .brand-logos{display:flex; align-items:center; gap:10px; margin-top:7px;}
  .brand-logo-chip{
    background:#fff; border-radius:7px; padding:5px 9px; display:flex; align-items:center;
    height:30px; box-shadow:0 1px 2px rgba(0,0,0,0.15);
  }
  .brand-logo-chip img{ height:100%; width:auto; display:block; object-fit:contain; }
  .brand-logo-sep{ color:#C7D3E0; font-size:13px; }
  .sync-badge{
    display:flex; align-items:center; gap:7px;
    font-size:11.5px; color:#D9E2EC; background:rgba(255,255,255,0.08);
    padding:6px 12px; border-radius:20px; white-space:nowrap; margin-top:2px;
    border:1px solid rgba(255,255,255,0.12);
  }
  .sync-dot{width:7px;height:7px;border-radius:50%; background:#7FD99A; flex-shrink:0;}
  .sync-dot.saving{background:#F0C24B; animation:pulse 1s infinite;}
  .sync-dot.error{background:#E6675F;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

  nav.tabs{
    display:flex; gap:2px; margin-top:16px; overflow-x:auto;
    scrollbar-width:none;
  }
  nav.tabs::-webkit-scrollbar{display:none;}
  nav.tabs button{
    background:transparent; border:none; color:#B9C7D6;
    padding:11px 18px; font-size:13.5px; font-weight:600; font-family:'Inter',sans-serif;
    cursor:pointer; white-space:nowrap; border-bottom:3px solid transparent;
    transition:color .15s, border-color .15s;
  }
  nav.tabs button:hover{color:#fff;}
  nav.tabs button.active{color:#fff; border-bottom:3px solid var(--gold);}

  main{flex:1; padding:26px 28px 60px 28px; max-width:1520px; width:100%; margin:0 auto;}
  .panel{display:none;}
  .panel.active{display:block; animation:fade .25s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

  .section-title{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:14px; flex-wrap:wrap;}
  .section-title h2{font-size:20px; color:var(--navy);}
  .section-sub{color:var(--muted); font-size:12.5px; margin-top:3px;}

  .card{
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:18px 20px; margin-bottom:20px;
  }
  .card h3{font-size:14.5px; color:var(--navy); margin-bottom:12px; font-weight:600; font-family:'Inter',sans-serif; text-transform:uppercase; letter-spacing:0.4px;}

  /* ---------- KPI cards ---------- */
  .kpi-grid{display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:20px;}
  @media (max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:560px){.kpi-grid{grid-template-columns:1fr;}}
  .kpi{
    border-radius:var(--radius); padding:16px 18px; color:#fff;
    box-shadow:var(--shadow); position:relative; overflow:hidden;
  }
  .kpi .label{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; opacity:0.92;}
  .kpi .value{font-family:'IBM Plex Mono',monospace; font-size:24px; font-weight:600; margin-top:8px;}
  .kpi.k-fund{background:linear-gradient(135deg,var(--navy),var(--navy-3));}
  .kpi.k-disb{background:linear-gradient(135deg,#2C5478,#3E75A8);}
  .kpi.k-billed{background:linear-gradient(135deg,#2F6B3A,#4A9257);}
  .kpi.k-pending{background:linear-gradient(135deg,#A9781F,var(--gold));}
  .kpi.k-avail{background:linear-gradient(135deg,#8A2A22,#B3402F);}

  .grid-2{display:grid; grid-template-columns:1.1fr 1fr; gap:20px;}
  @media (max-width:1000px){.grid-2{grid-template-columns:1fr;}}

  .fund-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:20px;}
  @media (max-width:1100px){.fund-grid{grid-template-columns:1fr;}}

  /* ---------- Tables ---------- */
  .table-wrap{overflow-x:auto; border:1px solid var(--border); border-radius:var(--radius); background:var(--card);}
  table{border-collapse:collapse; width:100%; min-width:640px;}
  table.wide{min-width:1720px;}
  thead th{
    background:var(--navy); color:#fff; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.3px;
    padding:10px 10px; text-align:left; white-space:nowrap; position:sticky; top:0; z-index:2;
  }
  tbody td{
    padding:6px 8px; border-bottom:1px solid var(--border); font-size:12.5px; vertical-align:middle;
  }
  tbody tr:hover{background:#FBFAF7;}
  tbody tr.sample{background:#FCFAF3;}
  tbody tr.sample td{font-style:italic; color:var(--muted-2);}

  td input[type=text], td input[type=number], td input[type=date], td select{
    width:100%; border:1px solid transparent; background:var(--gold-bg); border-radius:5px;
    padding:5px 6px; font-family:inherit; font-size:12.5px; color:var(--ink); min-width:90px;
  }
  td input[type=number]{font-family:'IBM Plex Mono',monospace;}
  td input:focus, td select:focus{border-color:var(--gold); outline:none; background:#fff;}
  td select{cursor:pointer;}
  .ref-table td input, .ref-table td select{min-width:70px;}

  .del-btn{
    background:none; border:none; color:var(--red); cursor:pointer; font-size:15px; padding:4px 7px;
    border-radius:6px; line-height:1;
  }
  .del-btn:hover{background:var(--red-bg);}

  .badge{display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700;}
  .badge.status-Requested{background:var(--gold-bg); color:#8A6316;}
  .badge.status-Approved{background:#E9EEF7; color:#2C5478;}
  .badge.status-Disbursed{background:#E9EEF7; color:#1F3D5C;}
  .badge.status-Completed---Billed{background:var(--green-bg); color:var(--green);}
  .badge.status-Cancelled{background:var(--red-bg); color:var(--red);}
  .badge.liq-Yes{background:var(--green-bg); color:var(--green);}
  .badge.liq-No{background:var(--red-bg); color:var(--red);}

  /* ---------- Buttons ---------- */
  .btn{
    display:inline-flex; align-items:center; gap:6px; font-family:'Inter',sans-serif; font-weight:600; font-size:12.5px;
    padding:8px 14px; border-radius:7px; border:1px solid var(--border-2); background:#fff; color:var(--navy);
    cursor:pointer; transition:all .15s; white-space:nowrap;
  }
  .btn:hover{border-color:var(--navy); background:#F5F7FA;}
  .btn-primary{background:var(--navy); color:#fff; border-color:var(--navy);}
  .btn-primary:hover{background:var(--navy-2);}
  .btn-gold{background:var(--gold); color:#fff; border-color:var(--gold);}
  .btn-gold:hover{background:#A2761F;}
  .btn-sm{padding:6px 11px; font-size:11.5px;}
  .toolbar{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px;}
  .toolbar input[type=text], .toolbar select{
    padding:8px 11px; border:1px solid var(--border-2); border-radius:7px; font-size:12.5px; font-family:inherit; background:#fff;
  }
  .toolbar input[type=text]{min-width:220px;}
  .spacer{flex:1;}

  .legend-strip{display:flex; gap:16px; flex-wrap:wrap; font-size:11.5px; color:var(--muted); margin-bottom:14px;}
  .legend-chip{display:flex; align-items:center; gap:6px;}
  .legend-swatch{width:12px; height:12px; border-radius:3px; display:inline-block; border:1px solid var(--border-2);}

  .empty-state{padding:40px 20px; text-align:center; color:var(--muted-2);}

  footer.app-footer{padding:20px 28px 30px; text-align:center; color:var(--muted-2); font-size:11.5px;}

  ::-webkit-scrollbar{height:9px; width:9px;}
  ::-webkit-scrollbar-thumb{background:var(--border-2); border-radius:6px;}
  ::-webkit-scrollbar-track{background:transparent;}

  .chart-box{position:relative; height:260px;}

  .guide-block{margin-bottom:18px;}
  .guide-block h4{font-size:13.5px; color:var(--navy); margin:0 0 4px 0; font-family:'Inter',sans-serif; font-weight:700;}
  .guide-block p{margin:0; color:#444; font-size:13px;}
  .step-num{
    display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%;
    background:var(--gold); color:#fff; font-size:11.5px; font-weight:700; margin-right:8px; flex-shrink:0;
  }
</style>
</head>
<body>

<!-- Cloud database + login settings (edit config.js, NOT this file) -->
<script src="config.js"></script>
<script>
  /* ================================================================
     A1+ Petty Cash Portal — Login (Supabase Auth)
     Users sign in with an email + password created in your Supabase
     project (Authentication -> Users -> Add user). No passwords are
     stored in this file. Login only turns on once config.js is filled
     in; otherwise the portal runs locally as before with no login.
     ================================================================ */
  (function () {
    var cfg = window.PCF_CONFIG || {};
    var url = (cfg.SUPABASE_URL || "").replace(/\/+$/, "");
    var anon = cfg.SUPABASE_ANON_KEY || "";
    var configured = !!url && !!anon && url.indexOf("YOUR-") === -1 && anon.indexOf("YOUR-") === -1;
    var SESSION_KEY = "pcf_session";

    var resolveReady;
    var auth = window.PCF_AUTH = {
      accessToken: null,
      email: null,
      configured: configured,
      ready: new Promise(function (r) { resolveReady = r; })
    };

    if (!configured) { resolveReady(); return; }

    function nowSec() { return Math.floor(Date.now() / 1000); }
    function loadSession() { try { return JSON.parse(localStorage.getItem(SESSION_KEY) || "null"); } catch (e) { return null; } }
    function saveSession(s) { localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }
    function clearSession() { localStorage.removeItem(SESSION_KEY); }

    async function tokenRequest(grant, body) {
      var res = await fetch(url + "/auth/v1/token?grant_type=" + grant, {
        method: "POST",
        headers: { "apikey": anon, "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      var data = await res.json().catch(function () { return {}; });
      if (!res.ok) throw new Error(data.error_description || data.msg || data.error || ("Sign in failed (" + res.status + ")"));
      return data;
    }
    function applySession(data) {
      var s = {
        access_token: data.access_token,
        refresh_token: data.refresh_token,
        expires_at: nowSec() + (data.expires_in || 3600),
        email: data.user && data.user.email
      };
      saveSession(s);
      auth.accessToken = s.access_token;
      auth.email = s.email;
      return s;
    }

    auth.login = async function (email, password) {
      applySession(await tokenRequest("password", { email: email, password: password }));
      return true;
    };

    var refreshing = null;
    auth.tryRefresh = function () {
      if (refreshing) return refreshing;
      var s = loadSession();
      if (!s || !s.refresh_token) return Promise.resolve(false);
      refreshing = tokenRequest("refresh_token", { refresh_token: s.refresh_token })
        .then(function (data) { applySession(data); refreshing = null; return true; })
        .catch(function () { clearSession(); auth.accessToken = null; refreshing = null; return false; });
      return refreshing;
    };

    auth.logout = function () {
      try { fetch(url + "/auth/v1/logout", { method: "POST", headers: { "apikey": anon, "Authorization": "Bearer " + (auth.accessToken || anon) } }); } catch (e) {}
      clearSession();
      auth.accessToken = null;
      location.reload();
    };
    auth.requireLogin = function () { clearSession(); auth.accessToken = null; location.reload(); };

    /* ---- login screen UI ---- */
    var STYLE = `
      #pcf-auth-overlay{position:fixed;inset:0;z-index:2147483000;display:flex;align-items:center;justify-content:center;
        background:radial-gradient(1200px 600px at 50% -10%, #1f2937, #0b1220);padding:20px;
        font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
      .pcf-auth-card{width:100%;max-width:380px;background:#fff;border-radius:16px;padding:32px 28px;
        box-shadow:0 20px 60px rgba(0,0,0,.45);box-sizing:border-box;}
      .pcf-auth-brand{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#b45309,#f59e0b);
        color:#fff;font-weight:800;font-size:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;
        box-shadow:0 6px 16px rgba(180,83,9,.35);}
      .pcf-auth-title{margin:0;text-align:center;font-size:20px;font-weight:700;color:#111827;}
      .pcf-auth-sub{margin:6px 0 20px;text-align:center;font-size:13px;color:#6b7280;}
      .pcf-auth-label{display:block;font-size:12px;font-weight:600;color:#374151;margin:12px 0 6px;}
      .pcf-auth-input{width:100%;box-sizing:border-box;padding:11px 12px;border:1px solid #d1d5db;border-radius:10px;
        font-size:14px;color:#111827;outline:none;transition:border-color .15s,box-shadow .15s;}
      .pcf-auth-input:focus{border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.2);}
      .pcf-auth-btn{width:100%;margin-top:20px;padding:12px;border:0;border-radius:10px;
        background:linear-gradient(135deg,#b45309,#f59e0b);color:#fff;font-size:15px;font-weight:700;cursor:pointer;
        transition:filter .15s,opacity .15s;}
      .pcf-auth-btn:hover{filter:brightness(1.06);}
      .pcf-auth-btn:disabled{opacity:.7;cursor:default;}
      .pcf-auth-err{min-height:18px;margin-top:12px;color:#dc2626;font-size:12.5px;text-align:center;font-weight:600;}
      .pcf-auth-spin{width:34px;height:34px;border-radius:50%;border:3px solid #e5e7eb;border-top-color:#f59e0b;
        margin:10px auto 0;animation:pcf-spin .8s linear infinite;}
      @keyframes pcf-spin{to{transform:rotate(360deg);}}
      #pcf-auth-badge{position:fixed;bottom:12px;right:12px;z-index:2147482000;display:flex;align-items:center;gap:8px;
        background:rgba(17,24,39,.85);color:#fff;padding:6px 8px 6px 12px;border-radius:999px;
        font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-size:12px;
        box-shadow:0 4px 14px rgba(0,0,0,.25);}
      .pcf-badge-email{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:.9;}
      .pcf-badge-btn{border:0;background:#f59e0b;color:#111827;font-weight:700;font-size:11.5px;padding:5px 10px;
        border-radius:999px;cursor:pointer;}
      .pcf-badge-btn:hover{filter:brightness(1.06);}
      #pcf-auth-badge.pcf-inheader{position:static;bottom:auto;right:auto;background:transparent;box-shadow:none;
        padding:0;margin-left:auto;color:inherit;}
      #pcf-auth-badge.pcf-inheader .pcf-badge-email{color:inherit;opacity:.7;}
    `;
    function injectStyle() { var s = document.createElement("style"); s.textContent = STYLE; (document.head || document.documentElement).appendChild(s); }

    var overlay;
    function ensureOverlay() {
      if (!overlay) { overlay = document.createElement("div"); overlay.id = "pcf-auth-overlay"; document.body.appendChild(overlay); }
      return overlay;
    }
    function removeOverlay() { if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay); overlay = null; }

    function showLoading(msg) {
      ensureOverlay().innerHTML =
        '<div class="pcf-auth-card"><div class="pcf-auth-brand">A1+</div>' +
        '<div class="pcf-auth-spin"></div><p class="pcf-auth-sub">' + (msg || "Signing in…") + '</p></div>';
    }

    function esc(t) { var d = document.createElement("div"); d.textContent = t == null ? "" : String(t); return d.innerHTML; }

    function showLogin(msg) {
      ensureOverlay().innerHTML =
        '<form class="pcf-auth-card" id="pcf-login-form" autocomplete="on">' +
        '  <div class="pcf-auth-brand">A1+</div>' +
        '  <h1 class="pcf-auth-title">Petty Cash Portal</h1>' +
        '  <p class="pcf-auth-sub">Please sign in to continue</p>' +
        '  <label class="pcf-auth-label" for="pcf-email">Email</label>' +
        '  <input class="pcf-auth-input" type="email" id="pcf-email" required autocomplete="username" placeholder="you@company.com" />' +
        '  <label class="pcf-auth-label" for="pcf-pass">Password</label>' +
        '  <input class="pcf-auth-input" type="password" id="pcf-pass" required autocomplete="current-password" placeholder="••••••••" />' +
        '  <div class="pcf-auth-err" id="pcf-err">' + esc(msg) + '</div>' +
        '  <button class="pcf-auth-btn" type="submit" id="pcf-submit">Sign in</button>' +
        '</form>';
      var form = document.getElementById("pcf-login-form");
      var err = document.getElementById("pcf-err");
      var btn = document.getElementById("pcf-submit");
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        err.textContent = "";
        btn.disabled = true; btn.textContent = "Signing in…";
        var email = document.getElementById("pcf-email").value.trim();
        var pass = document.getElementById("pcf-pass").value;
        auth.login(email, pass)
          .then(function () { onAuthenticated(); })
          .catch(function (ex) { err.textContent = (ex && ex.message) || "Sign in failed"; btn.disabled = false; btn.textContent = "Sign in"; });
      });
      var em = document.getElementById("pcf-email"); if (em) em.focus();
    }

    function mountBadge() {
      if (document.getElementById("pcf-auth-badge")) return;
      function build(inHeader) {
        var w = document.createElement("div");
        w.id = "pcf-auth-badge";
        if (inHeader) w.className = "pcf-inheader";
        w.innerHTML = '<span class="pcf-badge-email"></span><button class="pcf-badge-btn" id="pcf-logout" type="button">Sign out</button>';
        w.querySelector(".pcf-badge-email").textContent = auth.email || "Signed in";
        w.querySelector("#pcf-logout").addEventListener("click", function () { auth.logout(); });
        return w;
      }
      var header = document.querySelector("header.topbar, .topbar");
      if (header) { header.appendChild(build(true)); return; }
      var placed = false;
      var obs = new MutationObserver(function () {
        if (placed || document.getElementById("pcf-auth-badge")) return;
        var h = document.querySelector("header.topbar, .topbar");
        if (h) { placed = true; obs.disconnect(); h.appendChild(build(true)); }
      });
      obs.observe(document.documentElement, { childList: true, subtree: true });
      setTimeout(function () {
        if (placed || document.getElementById("pcf-auth-badge")) return;
        placed = true; obs.disconnect(); document.body.appendChild(build(false));
      }, 5000);
    }

    var authed = false;
    function onAuthenticated() {
      if (authed) return; authed = true;
      resolveReady();
      removeOverlay();
      mountBadge();
    }

    function boot() {
      injectStyle();
      var sess = loadSession();
      if (sess && sess.access_token && sess.expires_at && (sess.expires_at - 60) > nowSec()) {
        auth.accessToken = sess.access_token; auth.email = sess.email;
        onAuthenticated();
      } else if (sess && sess.refresh_token) {
        showLoading();
        auth.tryRefresh().then(function (ok) { ok ? onAuthenticated() : showLogin("Your session expired. Please sign in again."); });
      } else {
        showLogin();
      }
    }
    if (document.body) boot();
    else document.addEventListener("DOMContentLoaded", boot);
  })();
</script>
<script>
  /* ================================================================
     A1+ Petty Cash Portal — shared cloud storage (Supabase)
     Defines window.storage so this portal's built-in "shared" mode
     saves every branch's data to one open-source Postgres database.
     ================================================================ */
  (function () {
    var cfg = window.PCF_CONFIG || {};
    var url = (cfg.SUPABASE_URL || "").replace(/\/+$/, "");
    var anon = cfg.SUPABASE_ANON_KEY || "";
    var configured = !!url && !!anon && url.indexOf("YOUR-") === -1 && anon.indexOf("YOUR-") === -1;
    var TABLE = "app_storage";

    async function rest(path, opts) {
      opts = opts || {};
      function build(token) {
        var o = { method: opts.method, body: opts.body };
        o.headers = Object.assign({
          "apikey": anon,
          "Authorization": "Bearer " + (token || (window.PCF_AUTH && window.PCF_AUTH.accessToken) || anon),
          "Content-Type": "application/json"
        }, opts.headers || {});
        return o;
      }
      var res = await fetch(url + "/rest/v1/" + path, build());
      if (res.status === 401 && window.PCF_AUTH && window.PCF_AUTH.tryRefresh) {
        var ok = await window.PCF_AUTH.tryRefresh();
        if (ok) res = await fetch(url + "/rest/v1/" + path, build(window.PCF_AUTH.accessToken));
        else if (window.PCF_AUTH.requireLogin) window.PCF_AUTH.requireLogin();
      }
      return res;
    }

    window.storage = {
      get: async function (key) {
        if (!configured) {
          var lv = localStorage.getItem(key);
          return lv == null ? null : { value: lv };
        }
        if (window.PCF_AUTH) await window.PCF_AUTH.ready;
        if (window.PCF_AUTH && !window.PCF_AUTH.accessToken) {
          var lc = localStorage.getItem(key);
          return lc == null ? null : { value: lc };
        }
        try {
          var res = await rest(TABLE + "?select=value&key=eq." + encodeURIComponent(key), { method: "GET" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          var rows = await res.json();
          if (rows && rows.length && rows[0].value != null) {
            localStorage.setItem(key, rows[0].value);
            return { value: rows[0].value };
          }
          var local = localStorage.getItem(key);
          if (local != null) {
            try { await window.storage.set(key, local); } catch (e) {}
            return { value: local };
          }
          return null;
        } catch (e) {
          console.warn("[storage] cloud read failed, using local cache:", e);
          var cv = localStorage.getItem(key);
          return cv == null ? null : { value: cv };
        }
      },
      set: async function (key, value) {
        localStorage.setItem(key, value);
        if (!configured) return true;
        if (window.PCF_AUTH) await window.PCF_AUTH.ready;
        if (window.PCF_AUTH && !window.PCF_AUTH.accessToken) return true;
        try {
          var res = await rest(TABLE + "?on_conflict=key", {
            method: "POST",
            headers: { "Prefer": "resolution=merge-duplicates,return=minimal" },
            body: JSON.stringify({ key: key, value: value, updated_at: new Date().toISOString() })
          });
          if (!res.ok) throw new Error("HTTP " + res.status + " " + (await res.text()));
          return true;
        } catch (e) {
          console.error("[storage] cloud save failed:", e);
          return false;
        }
      }
    };

    if (!configured) {
      console.warn("[A1+ Petty Cash] Cloud database not configured yet — edit config.js. Using this browser's local storage only for now.");
    }
  })();
</script>

/* ======================= STORAGE ======================= */
/* This portal was originally built for a host that injected a
   `window.storage` bridge for shared cloud persistence. When the file is
   served as a static site (e.g. GitHub Pages) that bridge is absent, so we
   fall back to the browser's localStorage. In that mode data is saved
   per-browser on the current device rather than shared across users. */
const STORAGE_MODE = (window.storage && typeof window.storage.get === 'function') ? 'shared' : 'local';
if(STORAGE_MODE === 'local'){
  window.storage = {
    get(key){
      try{ return { value: localStorage.getItem(key) }; }
      catch(e){ return { value: null }; }
    },
    set(key, value){
      localStorage.setItem(key, value);
      return true;
    }
  };
}

const saveTimers = {};
function setSync(status){
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if(!dot || !txt) return;
  dot.className = 'sync-dot' + (status==='saving' ? ' saving' : status==='error' ? ' error' : '');
  const savedLabel = STORAGE_MODE === 'shared' ? 'Saved • Shared portal' : 'Saved • This device';
  txt.textContent = status==='saving' ? 'Saving…' : status==='error' ? 'Save failed — retrying' : savedLabel;
}

async function loadKey(key, fallback){
  try{
    const res = await window.storage.get(key, true);
    if(res && res.value) return JSON.parse(res.value);
    return fallback;
  }catch(e){
    return fallback;
  }
}

async function saveKeyNow(key, value){
  try{
    setSync('saving');
    await window.storage.set(key, JSON.stringify(value), true);
    setSync('ok');
  }catch(e){
    console.error('Save failed for', key, e);
    setSync('error');
  }
}

function scheduleSave(stateKey, storageKey){
  clearTimeout(saveTimers[stateKey]);
  setSync('saving');
  saveTimers[stateKey] = setTimeout(()=>{
    saveKeyNow(storageKey, state[stateKey]);
  }, 500);
}

async function loadAll(){
  const [fund, meta, branches, coa, subaccounts, ledger] = await Promise.all([
    loadKey(KEYS.fund, null),
    loadKey(KEYS.meta, null),
    loadKey(KEYS.branches, null),
    loadKey(KEYS.coa, null),
    loadKey(KEYS.subaccounts, null),
    loadKey(KEYS.ledger, null),
  ]);
  let firstRun = false;
  state.fund = fund || (firstRun=true, SEED.fund);
  state.meta = meta || SEED.meta;
  state.branches = branches || SEED.branches;
  state.coa = coa || SEED.coa;
  state.subaccounts = subaccounts || SEED.subaccounts;
  state.ledger = ledger || SEED.ledger;

  if(firstRun){
    // seed the shared store the first time anyone opens this portal
    await Promise.all([
      saveKeyNow(KEYS.fund, state.fund),
      saveKeyNow(KEYS.meta, state.meta),
      saveKeyNow(KEYS.branches, state.branches),
      saveKeyNow(KEYS.coa, state.coa),
      saveKeyNow(KEYS.subaccounts, state.subaccounts),
      saveKeyNow(KEYS.ledger, state.ledger),
    ]);
  }
  setSync('ok');
}

function downloadCsv(filename, rows){
  if(!rows.length){ alert('Nothing to export yet.'); return; }
  const headers = Object.keys(rows[0]);
  const csv = [headers.join(',')].concat(
    rows.map(r=>headers.map(h=>{
      let v = r[h]===undefined||r[h]===null ? '' : String(r[h]);
      if(v.includes(',')||v.includes('"')||v.includes('\n')) v = '"'+v.replace(/"/g,'""')+'"';
      return v;
    }).join(','))
  ).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function computeKpis(){
  const L = state.ledger;
  const totalFund = Object.values(state.fund).reduce((a,b)=>a+(Number(b)||0),0);
  const totalDisbursed = L.filter(r=>r.status).reduce((a,r)=>a+(Number(r.amountDisbursed)||0),0);
  const completedBilled = L.filter(r=>r.status==="Completed & Billed").reduce((a,r)=>a+(Number(r.amountDisbursed)||0),0);
  const pending = L.filter(r=>r.status==="Requested"||r.status==="Approved").reduce((a,r)=>a+(Number(r.amountRequested)||0),0);
  const available = totalFund - totalDisbursed;
  return { totalFund, totalDisbursed, completedBilled, pending, available };
}
function computeByBranch(){
  const plants = getPlants();
  return plants.map(p=>({ label:p, value: state.ledger.filter(r=>r.plant===p && r.status).reduce((a,r)=>a+(Number(r.amountDisbursed)||0),0) }));
}
function computeByCategory(){
  const cats = getCategories();
  return cats.map(c=>({ label:c, value: state.ledger.filter(r=>r.category===c && r.status).reduce((a,r)=>a+(Number(r.amountDisbursed)||0),0) })).filter(x=>x.value>0 || true);
}

function refTableHtml(title, sub, addLabel, headers, rowHtmlFn, rows, tbodyId){
  return `
    <div class="section-title">
      <div><h2>${title}</h2><div class="section-sub">${sub}</div></div>
      <button class="btn btn-primary" id="add_${tbodyId}">+ ${addLabel}</button>

    <div class="table-wrap">

        <thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}<th></th></tr></thead>
        <tbody id="${tbodyId}">${rows.map(rowHtmlFn).join('')}</tbody>
      </table>
    </div>
  `;
}

function mountRefTable(tbodyId, listKey, storageKey, onEditExtra){
  const tbody = document.getElementById(tbodyId);
  tbody.addEventListener('input', (e)=>{
    const t = e.target; const tr = t.closest('tr'); if(!tr) return;
    const idx = Number(tr.dataset.idx);
    const field = t.dataset.field; if(!field) return;
    state[listKey][idx][field] = t.value;
    scheduleSave(listKey, storageKey);
    if(onEditExtra) onEditExtra(field);
  });
  tbody.addEventListener('click', (e)=>{
    const idx = e.target.dataset.del;
    if(idx!==undefined){
      if(confirm('Delete this row?')){
        state[listKey].splice(Number(idx),1);
        scheduleSave(listKey, storageKey);
        renderPanel();
      }
    }
  });
}

      const hay = [r.id,r.requestedBy,r.description,r.remarks,r.category,r.subaccount].join(' ').toLowerCase();

function mountLedger(){
  renderLedgerRows();

  document.getElementById('addLedgerRow').onclick = ()=>{
    const newRow = { id: nextTxnId(), dateRequested:new Date().toISOString().slice(0,10), company:"", plant:"", subaccount:"",
      requestedBy:"", category:"", description:"", amountRequested:0, status:"Requested", dateDisbursed:"", amountDisbursed:0,
      liquidated:"No", orNumber:"", liquidationDate:"", custodian:"", readyForPO:"No", remarks:"" };
    state.ledger.unshift(newRow);
    scheduleSave('ledger', KEYS.ledger);
    renderLedgerRows();
  };

  document.getElementById('exportLedgerCsv').onclick = ()=>{
    downloadCsv('disbursement_ledger.csv', filteredLedger().map(r=>({
      TxnID:r.id, DateRequested:r.dateRequested, Company:r.company, Plant:r.plant, Subaccount:r.subaccount,
      RequestedBy:r.requestedBy, Category:r.category, Purpose:r.description, AmountRequested:r.amountRequested,
      Status:r.status, DateDisbursed:r.dateDisbursed, AmountDisbursed:r.amountDisbursed, Liquidated:r.liquidated,
      ORNumber:r.orNumber, LiquidationDate:r.liquidationDate, Custodian:r.custodian, ReadyForPO:r.readyForPO, Remarks:r.remarks,
    })));
  };

  document.getElementById('ledgerSearch').oninput = (e)=>{ ledgerFilters.q = e.target.value; renderLedgerRows(); };
  document.getElementById('filterPlant').onchange = (e)=>{ ledgerFilters.plant = e.target.value; renderLedgerRows(); };
  document.getElementById('filterStatus').onchange = (e)=>{ ledgerFilters.status = e.target.value; renderLedgerRows(); };
  document.getElementById('filterLiquidated').onchange = (e)=>{ ledgerFilters.liquidated = e.target.value; renderLedgerRows(); };

  const tbody = document.getElementById('ledgerTbody');

  tbody.addEventListener('input', (e)=>{
    const t = e.target;
    const tr = t.closest('tr'); if(!tr) return;
    const id = tr.dataset.id;
    const row = state.ledger.find(r=>r.id===id); if(!row) return;
    const field = t.dataset.field; if(!field) return;
    row[field] = t.type==='number' ? (parseFloat(t.value)||0) : t.value;
    scheduleSave('ledger', KEYS.ledger);
  });

  tbody.addEventListener('change', (e)=>{
    const t = e.target;
    const tr = t.closest('tr'); if(!tr) return;
    const id = tr.dataset.id;
    const row = state.ledger.find(r=>r.id===id); if(!row) return;
    const field = t.dataset.field; if(!field) return;
    row[field] = t.value;

    if(field==='plant'){
      // cascade: reset subaccount + auto-fill company + custodian
      row.company = getCompanyForPlant(t.value) || row.company;
      row.custodian = getCustodianForPlant(t.value) || row.custodian;
      const subOpts = getSubaccountsForPlant(t.value);
      row.subaccount = subOpts.includes(row.subaccount) ? row.subaccount : "";
      scheduleSave('ledger', KEYS.ledger);
      renderLedgerRows();
      return;
    }
    if(field==='status' || field==='liquidated'){
      scheduleSave('ledger', KEYS.ledger);
      renderLedgerRows();
      return;
    }
    scheduleSave('ledger', KEYS.ledger);
  });

  tbody.addEventListener('click', (e)=>{
    const delId = e.target.dataset.del;
    if(delId){
      if(confirm('Delete this transaction? This cannot be undone.')){
        state.ledger = state.ledger.filter(r=>r.id!==delId);
        scheduleSave('ledger', KEYS.ledger);
        renderLedgerRows();
      }
    }
  });
}

function renderCharts(){
  const byBranch = computeByBranch();
  const byCat = computeByCategory().filter(c=>c.value>0);
  const catData = byCat.length ? byCat : computeByCategory().slice(0,5);

  if(typeof Chart === 'undefined'){
    ['chartBranch','chartCategory'].forEach(id=>{
      const el = document.getElementById(id);
      if(el && el.parentElement) el.parentElement.innerHTML = '<div class="empty-state">Charts couldn\'t load (no connection to the chart library). Numbers above are still accurate.</div>';
    });
    return;
  }

  const gold = getComputedStyle(document.documentElement).getPropertyValue('--gold').trim();
  const navy3 = getComputedStyle(document.documentElement).getPropertyValue('--navy-3').trim();

  if(charts.branch) charts.branch.destroy();
  const ctxB = document.getElementById('chartBranch');
  if(ctxB){
    charts.branch = new Chart(ctxB, {
      type:'bar',
      data:{ labels: byBranch.map(b=>b.label), datasets:[{ label:'Disbursed', data: byBranch.map(b=>b.value), backgroundColor: navy3, borderRadius:5, maxBarThickness:60 }] },

function branchCodeForPlant(plant){ const b = state.branches.find(b=>b.plant===plant); return b ? b.code : plant; }
function subCodeFor(plant, subaccountName){
  const s = state.subaccounts.find(s=>s.plant===plant && s.name===subaccountName);

}

function poEligibleRows(){ return state.ledger.filter(r=>r.readyForPO==='Yes'); }

function poTemplateRow(r){
  const coaEntry = state.coa.find(c=>c.category===r.category);
  const amount = Number(r.amountDisbursed) || Number(r.amountRequested) || 0;
  const isCompleted = r.status === 'Completed & Billed';

  const isRequestedOnly = r.status === 'Requested';
  const reqDate = r.dateRequested ? new Date(r.dateRequested + 'T00:00:00') : null;
  return {
    "Branch": branchCodeForPlant(r.plant),
    "Inventory ID": null,
    "Sub.": subCodeFor(r.plant, r.subaccount),
    "Account": coaEntry ? coaEntry.code : "",
    "Description": r.category,
    "UOM": "PC",
    "Line Description": r.description,
    "Order Qty.": 1,
    "Unit Cost": amount,
    "Ext. Cost": amount,
    "Line Type": "Service",
    "Tax Category": null,
    "Accrual Account": null,
    "Warehouse": null,
    "Qty. On Receipts": 0,
    "Discount Percent": 0,
    "Discount Amount": 0,
    "Manual Discount": false,
    "Discount Code": null,
    "Prepaid Qty.": 0,
    "Prepaid Amount": 0,
    "Amount": amount,
    "Alternate ID": r.id,
    "Min. Receipt (%)": 100,
    "Max. Receipt (%)": 100,
    "Complete On (%)": 100,
    "Receipt Action": "Accept but Warn",
    "Accrual Sub.": null,
    "Requested": reqDate,
    "Promised": reqDate,
    "Completed": !isRequestedOnly,
    "Cancelled": isCancelled,
    "Closed": isCompleted,
    "Billed Qty.": isCompleted ? 1 : 0,
    "Billed Amount": isCompleted ? amount : 0,
    "Unbilled Qty.": isCompleted ? 0 : 1,
    "Unbilled Amount": isCompleted ? 0 : amount,
    "Blanket PO Type": null,
    "Blanket PO Nbr.": null,
    "Billing Based On": "Order",
  };
}

function poRows(){ return poEligibleRows().map(poTemplateRow); }

  const rows = poRows();
  return `

      <div style="display:flex; gap:8px;">
        <button class="btn btn-gold" id="exportPoXlsx">⬇ Export PO (.xlsx, template layout)</button>

      </div>
    </div>
    <div class="table-wrap">
      <table class="wide">
        <thead><tr>${PO_TEMPLATE_HEADERS.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead>
        <tbody>${rows.length ? rows.map(r=>`<tr>${PO_TEMPLATE_HEADERS.map(h=>{
          const v = r[h];
          if(v instanceof Date) return `<td>${esc(v.toISOString().slice(0,10))}</td>`;
          if(typeof v === 'boolean') return `<td>${v ? 'Yes' : 'No'}</td>`;
          if(typeof v === 'number') return `<td class="num">${money(v)}</td>`;

function mountPo(){
  document.getElementById('exportPoCsv').onclick = ()=> downloadCsv('po_upload_acumatica.csv', poRows().map(r=>{
    const flat = {};
    PO_TEMPLATE_HEADERS.forEach(h=>{
      const v = r[h];
      flat[h] = v instanceof Date ? v.toISOString().slice(0,10) : v;
    });
    return flat;
  }));

  document.getElementById('exportPoXlsx').onclick = ()=>{
    if(typeof XLSX === 'undefined'){ alert('Excel export library failed to load — check your internet connection and try again.'); return; }
    const rows = poRows();
    if(!rows.length){ alert('No rows marked "Ready for PO" yet.'); return; }
    const ws = XLSX.utils.json_to_sheet(rows, {header: PO_TEMPLATE_HEADERS});
    ws['!cols'] = PO_TEMPLATE_HEADERS.map(h => ({wch: Math.max(12, Math.min(30, h.length + 4))}));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Purchase Orders');
    XLSX.writeFile(wb, 'Purchase_Orders_' + new Date().toISOString().slice(0,10) + '.xlsx', {cellDates:true});
  };
}

/* ======================= RENDER: PCF MONITORING REPORT ======================= */
function computeFundStats(plant){
  const rows = state.ledger.filter(r=>r.plant===plant);
  const beginning = Number(state.fund[plant]) || 0;
  const disbursed = rows.reduce((a,r)=>a+(Number(r.amountDisbursed)||0),0);
  const completedBilled = rows.filter(r=>r.status==="Completed & Billed").reduce((a,r)=>a+(Number(r.amountDisbursed)||0),0);
  const pending = rows.filter(r=>r.status==="Requested"||r.status==="Approved").reduce((a,r)=>a+(Number(r.amountRequested)||0),0);
  const unliquidated = rows.filter(r=>r.status!=="Cancelled" && r.liquidated!=="Yes").reduce((a,r)=>a+(Number(r.amountDisbursed)||0),0);
  const available = beginning - disbursed;
  return {
    plant, beginning, disbursed, completedBilled, pending, unliquidated, available,
    txnCount: rows.length,
    company: getCompanyForPlant(plant),
    custodian: getCustodianForPlant(plant),
    rows: rows.slice().sort((a,b)=>(a.dateRequested||'').localeCompare(b.dateRequested||'')),
  };
}

function fundCardHtml(s){
  return `
    <div class="card" style="margin-bottom:0;">
      <h3>${esc(s.plant)}</h3>
      <div class="section-sub" style="margin-bottom:10px;">${esc(s.company)} &middot; Custodian: ${esc(s.custodian)||'—'}</div>
      <table style="width:100%;">
        <tbody>
          <tr><td style="padding:4px 0; color:var(--muted);">Beginning Balance</td><td class="num" style="text-align:right; font-weight:600;">₱ ${money(s.beginning)}</td></tr>
          <tr><td style="padding:4px 0; color:var(--muted);">Total Disbursed</td><td class="num" style="text-align:right;">₱ ${money(s.disbursed)}</td></tr>
          <tr><td style="padding:4px 0; color:var(--muted);">Completed &amp; Billed</td><td class="num" style="text-align:right;">₱ ${money(s.completedBilled)}</td></tr>
          <tr><td style="padding:4px 0; color:var(--muted);">Pending / Requested</td><td class="num" style="text-align:right;">₱ ${money(s.pending)}</td></tr>
          <tr><td style="padding:4px 0; color:var(--muted);">Unliquidated (disbursed, no OR yet)</td><td class="num" style="text-align:right;">₱ ${money(s.unliquidated)}</td></tr>
          <tr style="border-top:2px solid var(--navy);"><td style="padding:8px 0 0 0; font-weight:700; color:var(--navy);">Available Balance</td><td class="num" style="text-align:right; padding-top:8px; font-weight:700; color:${s.available<0?'var(--red)':'var(--navy)'};">₱ ${money(s.available)}</td></tr>
        </tbody>
      </table>
      <div class="section-sub" style="margin-top:10px;">${s.txnCount} transaction${s.txnCount===1?'':'s'} on file for this plant</div>
    </div>
  `;
}

function monitoringTableHtml(s){
  return `
    <div class="card">
      <h3>${esc(s.plant)} — Transaction Detail</h3>
      <div class="table-wrap">
        <table class="wide">
          <thead><tr>
            <th>Txn ID</th><th>Date Req.</th><th>Subaccount</th><th>Requested By</th><th>Category</th>
            <th>Purpose</th><th>Amt. Requested</th><th>Status</th><th>Amt. Disbursed</th><th>Liquidated?</th><th>OR No.</th>
          </tr></thead>
          <tbody>${s.rows.length ? s.rows.map(r=>`
            <tr>
              <td style="font-weight:600; white-space:nowrap;">${esc(r.id)}</td>
              <td>${esc(r.dateRequested||'—')}</td>
              <td>${esc(r.subaccount||'—')}</td>
              <td>${esc(r.requestedBy||'—')}</td>
              <td>${esc(r.category||'—')}</td>
              <td>${esc(r.description||'—')}</td>
              <td class="num">₱ ${money(r.amountRequested)}</td>
              <td><span class="badge ${badgeClass('status', r.status)}">${esc(r.status||'—')}</span></td>
              <td class="num">₱ ${money(r.amountDisbursed)}</td>
              <td><span class="badge ${badgeClass('liq', r.liquidated)}">${esc(r.liquidated||'No')}</span></td>
              <td>${esc(r.orNumber||'—')}</td>
            </tr>`).join('') : `<tr><td colspan="11"><div class="empty-state">No transactions logged for ${esc(s.plant)} yet.</div></td></tr>`}</tbody>
        </table>
      </div>
    </div>
  `;
}

function renderMonitoring(){
  const stats = getPlants().map(computeFundStats);
  return `
    <div class="section-title">
      <div><h2>PCF Monitoring Report</h2><div class="section-sub">Beginning balance, disbursements and available balance for Manila, Warner and Disney — as of ${esc(new Date().toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'}))}.</div></div>
      <button class="btn btn-gold" id="exportMonitoringXlsx">⬇ Generate Report (.xlsx)</button>
    </div>
    <div class="fund-grid">
      ${stats.map(fundCardHtml).join('')}
    </div>
    ${stats.map(monitoringTableHtml).join('')}
  `;
}

function mountMonitoring(){
  document.getElementById('exportMonitoringXlsx').onclick = ()=>{
    if(typeof XLSX === 'undefined'){ alert('Excel export library failed to load — check your internet connection and try again.'); return; }
    const stats = getPlants().map(computeFundStats);
    const wb = XLSX.utils.book_new();

    const summary = stats.map(s=>({
      Plant: s.plant, Company: s.company, Custodian: s.custodian,
      'Beginning Balance': s.beginning, 'Total Disbursed': s.disbursed,
      'Completed & Billed': s.completedBilled, 'Pending / Requested': s.pending,
      'Unliquidated': s.unliquidated, 'Available Balance': s.available,
      'Transaction Count': s.txnCount,
    }));
    const wsSummary = XLSX.utils.json_to_sheet(summary);
    XLSX.utils.book_append_sheet(wb, wsSummary, 'Summary');

    stats.forEach(s=>{
      const data = s.rows.map(r=>({
        TxnID:r.id, DateRequested:r.dateRequested, Subaccount:r.subaccount, RequestedBy:r.requestedBy,
        Category:r.category, Purpose:r.description, AmountRequested:r.amountRequested, Status:r.status,
        DateDisbursed:r.dateDisbursed, AmountDisbursed:r.amountDisbursed, Liquidated:r.liquidated,
        ORNumber:r.orNumber, LiquidationDate:r.liquidationDate, Custodian:r.custodian, Remarks:r.remarks,
      }));
      const ws = data.length ? XLSX.utils.json_to_sheet(data) : XLSX.utils.aoa_to_sheet([['No transactions logged for this plant yet.']]);
      // sheet names max 31 chars, no special chars
      XLSX.utils.book_append_sheet(wb, ws, s.plant.slice(0,31));
    });

    XLSX.writeFile(wb, 'PCF_Monitoring_Report_' + new Date().toISOString().slice(0,10) + '.xlsx');
  };
}

/* ======================= TAB SWITCHING / MOUNT ======================= */
const PANELS = {
  dashboard: { render: renderDashboard, mount: mountDashboard },
  ledger:    { render: renderLedger,    mount: mountLedger },
  branches:  { render: renderBranches,  mount: mountBranches },
  coa:       { render: renderCoa,       mount: mountCoa },
  subaccounts:{ render: renderSubaccounts, mount: mountSubaccounts },
  po:        { render: renderPo,        mount: mountPo },
  monitoring:{ render: renderMonitoring, mount: mountMonitoring },
  guide:     { render: renderGuide,     mount: ()=>{} },
};

function renderPanel(){
  const main = document.getElementById('main');
  const p = PANELS[activeTab];
  main.innerHTML = `<div class="panel active">${p.render()}</div>`;
  p.mount();
}

function switchTab(tab){
  activeTab = tab;
  document.querySelectorAll('#tabNav button').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  renderPanel();
}

document.getElementById('tabNav').addEventListener('click', (e)=>{
  const btn = e.target.closest('button[data-tab]');
  if(btn) switchTab(btn.dataset.tab);
});

/* ======================= INIT ======================= */
(async function init(){
  await loadAll();
  renderPanel();
})();
</script>
